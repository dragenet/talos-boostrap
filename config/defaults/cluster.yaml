---
# config/defaults/cluster.yaml — TEMPLATE-OWNED defaults.
#
# This file contains sensible provider-agnostic defaults for any cluster built
# from this template. Users never edit this file — cluster-specific choices go
# in config/overrides/cluster.yaml. The render deep-merges defaults with
# overrides (overrides win per-key) to produce the effective configuration.
#
# Template updates land here; pulling upstream improvements is conflict-free
# against user-owned overrides (ADR-011).

cluster:
  # Cluster identity — override per deployment.
  name: ""
  # Kubernetes version pinned to a stable known-good release.
  kubernetesVersion: v1.32.0
  # Talos/Kubernetes API VIP — override per deployment.
  # Single source of truth for the VIP: feeds both the Ansible cluster_vip var
  # (cluster endpoint, cert SANs) and the Talos network patch (control-plane
  # floating IP). Do NOT duplicate this under talos.network.vip — the renderer
  # rejects that key to prevent silent divergence.
  vip: ""
  # Kubernetes API endpoint. Computed from vip by default; override only if
  # the API is reached through a different address (e.g. external LB).
  endpoint: "https://{{ cluster_vip }}:6443"
  # Extra SANs for TLS certificates beyond defaults.
  certSANs:
    talos: []
    kubernetes: []
  # Full node_role → short code used only in hostnames (ADR-014).
  nodeRoleShort:
    controlplane: cp
    hybrid: hb
    worker: wk

provider:
  # Provider name: hcloud | manual. Determines which provider group_vars are
  # rendered and which provider-gated features are allowed (ADR-012).
  name: manual

flux:
  # Git provider for provider-specific bootstrap commands:
  #   generic          → flux bootstrap git only (works with any Git host)
  #   github           → flux bootstrap github (needs GITHUB_TOKEN for deploy-key creation)
  #   bitbucket-server → flux bootstrap bitbucket-server (needs BITBUCKET_TOKEN; Server/DC only)
  provider: generic
  # HTTPS or SSH repository URL. Required for generic git flows; useful as display
  # value / source of truth for all modes. Provider-deploy-key mode constructs its
  # own URL from owner + repository — repoUrl is optional for that mode.
  repoUrl: ""
  repoBranch: main
  path: ""
  auth:
    # Authentication mode for flux bootstrap:
    #   provider-deploy-key → provider-specific bootstrap creates a deploy/access key
    #     via provider API token (GITHUB_TOKEN / BITBUCKET_TOKEN); token is NOT
    #     stored in-cluster — only SSH key material lands in the Flux secret.
    #   https-token → Flux authenticates over HTTPS using a token/password supplied
    #     from SOPS-backed Ansible vars; token IS stored in the cluster as a Flux
    #     source secret.
    #   ssh-private-key → Flux authenticates over SSH using a user-provided private
    #     key file (+ optional passphrase); key material IS stored in the cluster
    #     as a Flux source secret.
    mode: ssh-private-key
    # HTTPS basic-auth username (usually "git" for most providers).
    username: git
    # Provider-specific repository owner (GitHub org/user) or project key (Bitbucket).
    # Required for github + bitbucket-server when mode is provider-deploy-key or https-token.
    owner: ""
    # Provider-specific repository slug / name — required for github + bitbucket-server
    # when mode is provider-deploy-key or https-token.
    repository: ""
    # Custom hostname for GitHub Enterprise or Bitbucket Server/DC (omit when using
    # the standard cloud-hosted provider at github.com).
    hostname: ""
    # --personal flag: use personal account instead of organisation (GitHub only).
    personal: false
    # --private flag: create a private repository. Provider-specific bootstrap.
    private: true
    # --read-write-key flag. Provider-deploy-key mode only.
    readWriteKey: false
    # Use a bearer token (--with-bearer-token) instead of HTTPS basic auth for
    # generic git flows. When true, the token is passed as a bearer token.
    tokenAuthBearer: false
    # Non-standard SSH host:port for Git SSH access (e.g. bitbucket.example.com:7999
    # for Bitbucket Server/DC). Maps to --ssh-hostname on flux bootstrap.
    sshHostname: ""
    # Local path to the SSH private key file for ssh-private-key mode.
    # Do NOT commit the key; this is a control-machine path, not a key body.
    privateKeyFile: ""
    # Custom CA certificate file for HTTPS connections.
    caFile: ""
    # Allow insecure HTTP connections (for development/testing only).
    allowInsecureHttp: false
    # --silent: assume deploy/access key is already set up (provider-deploy-key mode).
    silent: false

talos:
  # Talos Linux version — pin to a known-good release.
  version: v1.13.3
  extensions:
    # Base extensions included in every image. Override to add provider-specific
    # agents (e.g. qemu-guest-agent for Hetzner).
    base: []
    # User extension hook — added to base + feature-implied extensions.
    # The render rejects direct overrides of the computed talos_extensions;
    # users add via this key (ADR-011 compute-key rule).
    extra: []
  install:
    # Disk selection for Talos system partition. null = Talos default.
    disk: null
    # CEL diskSelector expression (Talos v1.13+). Takes precedence over disk
    # when both are set (ADR-013).
    diskSelector: null
  network:
    # VIP lives at cluster.vip (single source of truth) — do not set it here.
    # The renderer rejects talos.network.vip in overrides to prevent divergence.
    defaultInterface:
      # ADR-013 prefers deviceSelector (stable hardware identity) over
      # interface names (eth0/eth1 can change). Set deviceSelector when real
      # hardware identifiers are known; fall back to interface: otherwise.
      interface: null
      deviceSelector: null
  # Raw Talos patch fragments (Layer 2, ADR-013). Applied in order after
  # structured helpers; later patches win.
  patches:
    all: []
    controlplane: []

# CNI plugin: cilium | none. "none" leaves in-cluster CNI management enabled
# (Talos default); "cilium" disables it for pre-Flux Cilium install.
# Graduated from features.cni (config schema migration, June 2026).
cni:
  name: cilium

# Cloud Controller Manager tri-state (ADR-005):
#   auto  — resolve per provider: enable for providers with a supported CCM
#           (hcloud only today); disable for manual/bare-metal. This is the
#           template default — a new cluster on a supported cloud gets CCM
#           automatically without the operator having to know the provider key.
#   true  — force-enable; validation fails if the selected provider has no
#           supported CCM (e.g. manual with true → hard error).
#   false — disable the external cloud provider; no CCM is installed and the
#           Talos externalCloudProvider patch is not emitted.
#
# When resolved true and cni.name=cilium, the render emits hcloud-ccm into
# bootstrap_pre_flux_components and generates the Talos all-node patch setting
# cluster.externalCloudProvider=true so kubelet and kube-controller-manager run
# with --cloud-provider=external (the CCM clears the uninitialized taint and sets
# providerID/topology labels).
#
# ⚠️  The CCM pre-Flux INSTALLER (flux_bootstrap role `hcloud-ccm` step) is
# deferred to a later feature slice (plan 2026-06-22-cilium-ccm-csi). Enabling CCM
# before the installer lands would taint nodes with no CCM to clear them — the
# kube1 overrides explicitly set enabled: false (overriding the template auto
# default) until that slice ships.
# Graduated from features.hcloudCcm (config schema migration, June 2026).
cloud_controller_manager:
  enabled: auto

# Optional cluster features. These toggle add-on controllers and services
# deployed by Flux after bootstrap. CNI and CCM have been graduated to their own
# top-level keys (cni.name, cloud_controller_manager.enabled).
features:
  certManager: false
  # Ingress controller: none | envoy-gateway | traefik. Pick-one (ADR-012).
  ingress: none
  openebs: false
  hcloudCsi: false

# Storage volume definitions (ADR-013). User-owned list — replaces defaults.
storage:
  volumes: []

# Hetzner Cloud provider defaults. Only used when provider.name: hcloud.
hcloud:
  location: nbg1
  # Prioritized server type lists — first available in location wins.
  serverTypes: []
  serverTypesPerRole: {}
  # Temporary builder for image-talos.yml — small type is fine.
  builderServerTypes: []
  privateNetworkName: ""
  privateNetworkCidr: "10.0.0.0/16"
  privateSubnetCidr: "10.0.0.0/24"
  firewallName: ""
  sshKeyName: ""
  # false = scope API access to adminIps (recommended for stable IPs).
  # true = open to 0.0.0.0/0 + ::/0 (for dynamic IPs; APIs remain mTLS).
  firewallOpenAccess: false
  adminIps: []
  topology:
    controlplane: 0
    hybrid: 0
    worker: 0
  # Starting octet for node private IPs within the subnet.
  serversIpOffset: 11
