---
# yaml-language-server: $schema=../../schemas/cluster-input.schema.json
# config/clusters/kube1/cluster.yaml — USER-OWNED kube1-specific choices.
#
# This file carries every value that differs from the template defaults for
# the kube1 cluster. The render deep-merges this over config/defaults/cluster.yaml
# (overrides win per-key) and emits generated group_vars consumed by Ansible roles.
#
# This is the ADR-016 selected-cluster input path, loaded when
# config_cluster=kube1 (the default). For the legacy overrides fallback, see
# config/overrides/cluster.yaml — the render compiler falls back to that path
# only when the selected-cluster file is absent.
#
# Edit THIS file to change cluster configuration, then run:
#   ansible-playbook playbooks/render-config.yml -e config_cluster=kube1
# Review the generated diffs before running live playbooks.
#
# Migrated from the pre-refactor hand-authored group_vars:
#   inventories/common/group_vars/all/{cluster,talos,flux}.yml
#   inventories/providers/hcloud/group_vars/all/hcloud.yml

cluster:
  name: kube1
  kubernetesVersion: v1.36.0
  vip: 10.0.0.10
  # endpoint is computed from vip by default (https://<vip>:6443).
  # Override only if the API is reached through a different address.
  certSANs:
    # Extra IPs / hostnames added to TLS certificates beyond the defaults.
    # Both accept a mix of IPv4, IPv6, and DNS names.
    #
    # talos  → machine.certSANs  (Talos API, port 50000, all nodes)
    # kubernetes → cluster.apiServer.certSANs (kube-apiserver, port 6443,
    #                  controlplane + hybrid nodes only)
    #
    # Talos already includes the node's own IPs and the VIP by default. Add
    # extras here when you reach the cluster through another address — e.g. a
    # Tailscale IP, a Cloudflare Tunnel hostname, or an internal DNS alias:
    #
    #   talos:
    #     - 100.64.0.5          # Tailscale IP for this node
    #     - talos.ts.example.com
    #   kubernetes:
    #     - 100.64.0.10         # Tailscale IP used as the kubectl endpoint
    #     - k8s.ts.example.com
    talos: []
    kubernetes: []
  nodeRoleShort:
    controlplane: cp
    hybrid: hb
    worker: wk

provider:
  name: hcloud

flux:
  repoUrl: ''
  repoBranch: master
  path: ./flux/clusters/kube1

  # ── Flux bootstrap authentication (new section) ─────────────────────────────
  #
  # All auth fields have provider-agnostic defaults in config/defaults/cluster.yaml.
  # Override only what differs for kube1. Key decisions:
  #
  #   provider: generic | github | bitbucket-server
  #     generic           → flux bootstrap git (works with any Git host)
  #     github            → flux bootstrap github (deploy-key creation via PAT)
  #     bitbucket-server  → flux bootstrap bitbucket-server (Server/DC only)
  #
  #   auth.mode: provider-deploy-key | https-token | ssh-private-key
  #     provider-deploy-key → API token creates deploy key; token NOT stored in-cluster
  #     https-token         → HTTPS token auth; token IS stored in Flux source secret
  #     ssh-private-key     → existing SSH key; private key IS stored in Flux source secret
  #
  # If you keep the defaults (generic + ssh-private-key), flux bootstrap git uses
  # repoUrl + privateKeyFile to connect. Fill repoUrl with an SSH URL like:
  #   ssh://git@github.com/your-org/kube1.git
  # and set flux.auth.privateKeyFile to the local key path.
  #
  # For GitHub deploy-key mode:
  #   provider: github
  #   auth:
  #     mode: provider-deploy-key
  #     owner: your-github-org
  #     repository: infra-kube1
  #   # Then supply flux_auth_token (GITHUB_TOKEN PAT) via SOPS:
  #   # infra/ansible/inventories/common/group_vars/all/flux.sops.yaml
  #
  # SECRETS: flux_auth_token and flux_auth_private_key_passphrase are never
  # rendered from config/ — they live in SOPS-encrypted inventory group vars.

talos:
  version: v1.13.3
  extensions:
    # System extensions included in the Talos image. The talos_schematic role
    # resolves these into a deterministic schematic ID via factory.talos.dev.
    # Adding or removing an extension triggers a factory POST on the next run.
    base:
      - siderolabs/qemu-guest-agent
    extra: []
  network:
    # VIP is sourced from cluster.vip above (single source of truth).
    # talos.network.vip is intentionally absent — the renderer rejects it.
    defaultInterface:
      # ADR-013 prefers deviceSelector (stable hardware identity) over
      # interface names. Confirmed on kube1 via talosctl get links:
      # eth1 HW addr is 86:00:00:4d:a8:b8; cluster-wide selector is safe.
      deviceSelector:
        hardwareAddr: '86:00:00:*'

# CNI plugin — graduated from features.cni (config schema migration, June 2026).
cni:
  name: cilium

# Cloud Controller Manager — explicitly set to auto (matching the template
# default) so the hcloud provider resolves to enabled per ADR-005. When resolved
# true (hcloud + cilium), the render emits hcloud-ccm into
# bootstrap_pre_flux_components and generates the Talos all-node patch for
# cluster.externalCloudProvider. Manual clusters resolve auto to disabled.
#
# Flip to false to disable the CCM entirely; flip to true to force-enable
# (validation fails if the provider has no supported CCM or cni != cilium).
cloud_controller_manager:
  enabled: auto

features:
  certManager: true
  ingress: envoy-gateway
  openebs: true
  hcloudCsi: false

ingress:
  gatewayApiChannel: standard

storage:
  # A single raw volume carved from free space on the boot/system disk.
  # 20GB fixed-size partition (no grow): Talos OS + ephemeral occupies ~60GB
  # on an 80GB CX33 NVMe, leaving ~20GB headroom for OS upgrades and logs
  # before the 20GB raw volume boundary.
  #
  # openebs: true marks this volume as the OpenEBS LocalLV LVM VG backing device.
  # The vgName is a Flux-side concern — hardcoded as openebs-vg in the catalog
  # StorageClass and the node-DaemonSet init-container (ADR-009 addendum + §1a #4).
  #
  # No LUKS — Talos v1.13 RawVolumeConfig+LUKS has an unresolved shutdown/upgrade
  # deadlock (talos#13354). The schema structurally rejects any encryption key
  # via additionalProperties: false on the volume item.
  volumes:
    - name: openebs-lvm
      type: raw
      diskSelector: system_disk
      minSize: 20GB
      maxSize: 20GB
      openebs: true

hcloud:
  location: nbg1

  # Prioritized server type lists — first type available in hcloud_location wins.
  # Hetzner occasionally sells out specific types in a location; the fallback
  # ensures provisioning succeeds without manual intervention.
  serverTypes: [cx33, cx43]
  # serverTypesPerRole:
  #   controlplane: [cx23, cx33]   # etcd-only nodes can be smaller
  #   hybrid: [cx33, cx43]
  #   worker: [cx33, cx43]
  serverTypesPerRole: {}
  # For the temporary snapshot builder only; something small is fine.
  builderServerTypes: [cx23, cx33, cpx22]

  privateNetworkName: kube1
  privateNetworkCidr: 10.0.0.0/16
  privateSubnetCidr: 10.0.0.0/24
  firewallName: kube1

  # SSH key registered in Hetzner Cloud — used only during image build (rescue mode).
  sshKeyName: kube1-provisioning

  # ─── Admin access mode ─────────────────────────────────────────────────────
  #
  # firewallOpenAccess: false (default)
  #   Scopes the Talos API (50000) and Kubernetes API (6443) rules to adminIps.
  #   adminIps controls which IPs are allowed:
  #     []             → auto-detect YOUR CURRENT public IP via ifconfig.me at
  #                      provision time and firewall to that /32.
  #                      !! LOCK-OUT RISK: if your IP changes later the OLD IP
  #                      stays whitelisted — you silently lose access. Talos has
  #                      no SSH fallback. Set a stable range when you have one.
  #     ["1.2.3.4/32"] → pin specific CIDRs (recommended once you have a stable IP)
  #
  # firewallOpenAccess: true
  #   Opens port 50000 and 6443 to 0.0.0.0/0 + ::/0 (the whole internet).
  #   Use when your public IP is dynamic and frequently changes. The ports are
  #   still mTLS/cert-authenticated (talosctl / kubectl) — "open" only widens
  #   network reach, it does not disable auth. That said, it does expose endpoints
  #   to internet-wide scanning, so prefer the admin-IP mode when your IP is stable.
  #
  firewallOpenAccess: true
  adminIps: []

  # How many nodes of each role to provision. Names are derived automatically:
  # {{ cluster_name }}-{{ nodeRoleShort[role] }}{{ n }}
  # Private IPs are assigned deterministically from the subnet base + index,
  # ordered: controlplane nodes first, then hybrid, then worker.
  # Current cluster: 3 hybrid nodes (kube1-hb1 → 10.0.0.11, etc.)
  topology:
    controlplane: 0
    hybrid: 3
    worker: 0

  # Starting octet for node private IPs within privateSubnetCidr.
  # Layout of 10.0.0.0/24:
  #   .0  — network address
  #   .1  — Hetzner gateway
  #   .10 — cluster VIP (cluster.vip)
  #   .11+ — nodes, assigned sequentially: controlplane → hybrid → worker
  # serversIpOffset (11) is the first usable node address, deliberately placed
  # past the VIP so node IPs never collide with the floating VIP.
  serversIpOffset: 11
