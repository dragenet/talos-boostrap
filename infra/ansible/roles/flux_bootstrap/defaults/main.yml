---
# flux_bootstrap role defaults — all role-local, prefixed flux_bootstrap_.
#
# These values form the Flux adoption contract: the pre-Flux Ansible install must
# use the same release name, namespace, chart, and values as the Flux HelmRelease
# in flux/infrastructure/controllers/_components/ so Flux detects the existing
# release and adopts it on first reconciliation (install.disableTakeOwnership
# is left at its default false).
#
# All timeouts are in Helm duration format (e.g. "10m", "5m", "300s").

# --- Kubeconfig ---
# Generated by bootstrap-talos.yml at talos_secrets_dir/kubeconfig.
# talos_secrets_dir is set in inventories/common/group_vars/all/talos.yml
# and resolves to infra/talos/secrets/ relative to playbook_dir.
flux_bootstrap_kubeconfig: "{{ talos_secrets_dir }}/kubeconfig"

# --- Helm repositories ---

# Cilium chart repo (traditional Helm repo at helm.cilium.io).
flux_bootstrap_cilium_chart_repo_url: https://helm.cilium.io
flux_bootstrap_cilium_chart_name: cilium

# hcloud charts (includes CCM and CSI).
flux_bootstrap_hcloud_ccm_chart_repo_url: https://charts.hetzner.cloud
flux_bootstrap_hcloud_ccm_chart_name: hcloud-cloud-controller-manager

# --- Pre-Flux component list ---
# Derived from bootstrap_pre_flux_components (set in provider group_vars by
# the config_render role). Contains zero or more of: cilium, hcloud-ccm.
flux_bootstrap_components: "{{ bootstrap_pre_flux_components | default([]) }}"

# --- Cilium (pre-Flux CNI) ---
# Release identity — MUST match the Flux HelmRelease in
# flux/infrastructure/controllers/_components/cilium/helmrelease.yaml.

flux_bootstrap_cilium_namespace: cilium-system
flux_bootstrap_cilium_release_name: cilium
flux_bootstrap_cilium_chart_version: 1.19.5
flux_bootstrap_cilium_timeout: 10m

# Helm values for the Cilium install.
#
# Every value here matches the Flux adoption HelmRelease exactly
# (flux/infrastructure/controllers/_components/cilium/helmrelease.yaml) so
# Helm adoption is clean and Flux drift detection stays accurate. Values
# required for Cilium to run on Talos Linux (IPAM mode, cgroup mounts,
# securityContext capabilities, BPF legacy routing) are declared in BOTH
# places — the pre-Flux Ansible install and the Flux HelmRelease.
#
# The full set is installed by Ansible so Cilium actually works pre-Flux;
# Flux later adopts the release and the values persist (Helm 3 three-way
# merge).
flux_bootstrap_cilium_values:
  # --- Flux-adopted values ---
  kubeProxyReplacement: true
  # Cilium VXLAN tunnel — avoids needing the hcloud CCM route controller
  # (ADR-002, ADR-005). Matches the Flux HelmRelease.
  routingMode: tunnel
  l7Proxy: false
  gatewayAPI:
    enabled: false
  # Talos KubePrism runs on every node at localhost:7445. Without kube-proxy,
  # Cilium's init container cannot reach the K8s API via ClusterIP — KubePrism
  # is always reachable and avoids the chicken-and-egg bootstrap problem.
  # Recommended by docs.cilium.io for Talos.
  k8sServiceHost: localhost
  k8sServicePort: "7445"

  # --- Talos-required values (also declared in the Flux HelmRelease) ---
  # Talos assigns PodCIDRs to Node resources — Cilium must use
  # ipam.mode=kubernetes to consume them.
  ipam:
    mode: kubernetes
  # Talos already mounts cgroupv2 + bpffs at /sys/fs/cgroup. Cilium must not
  # try to auto-mount cgroups, and must use the host root path.
  cgroup:
    autoMount:
      enabled: false
    hostRoot: /sys/fs/cgroup
  # Talos Linux drops SYS_MODULE from workload capabilities (kernel modules
  # are managed by Talos itself). The full capability set is non-negotiable —
  # missing capabilities cause Cilium agent pods to fail.
  securityContext:
    capabilities:
      ciliumAgent:
        - CHOWN
        - KILL
        - NET_ADMIN
        - NET_RAW
        - IPC_LOCK
        - SYS_ADMIN
        - SYS_RESOURCE
        - DAC_OVERRIDE
        - FOWNER
        - SETGID
        - SETUID
      cleanCiliumState:
        - NET_ADMIN
        - SYS_ADMIN
        - SYS_RESOURCE
  # Talos 1.8+ enables forwardKubeDNSToHost by default, which conflicts with
  # Cilium's eBPF Host-Routing. Legacy host routing for DNS is the workaround
  # from official Cilium + Talos docs.
  bpf:
    hostLegacyRouting: true

  # --- Operator tolerations (match Flux HelmRelease exactly) ---
  # With external cloud provider enabled, Talos taints nodes with
  # node.cloudprovider.kubernetes.io/uninitialized:NoSchedule until the
  # CCM clears it. The Cilium agent DaemonSet tolerates all taints by
  # default (operator: Exists), but the operator deployment does NOT
  # tolerate the uninitialized taint (Cilium issue #41921). Without this,
  # the Cilium operator can't schedule during pre-Flux bootstrap (CCM
  # hasn't cleared the taint yet), deadlocking the CNI/CCM bootstrap chain.
  # The full tolerations list re-states the chart defaults because
  # operator.tolerations replaces rather than merges with chart defaults.
  operator:
    tolerations:
      - key: "node-role.kubernetes.io/control-plane"
        operator: "Exists"
      - key: "node-role.kubernetes.io/master"
        operator: "Exists"
      - key: "node.kubernetes.io/not-ready"
        operator: "Exists"
      - key: "node.cilium.io/agent-not-ready"
        operator: "Exists"
      - key: "node.cloudprovider.kubernetes.io/uninitialized"
        operator: "Exists"
        effect: "NoSchedule"

# --- hcloud Cloud Controller Manager (pre-Flux) ---
# Release identity — MUST match the Flux HelmRelease in
# flux/infrastructure/controllers/_components/providers/hcloud/ccm/helmrelease.yaml.

flux_bootstrap_hcloud_ccm_namespace: hcloud-ccm-system
flux_bootstrap_hcloud_ccm_release_name: hcloud-cloud-controller-manager
flux_bootstrap_hcloud_ccm_chart_version: "1.33.0"
flux_bootstrap_hcloud_ccm_secret_name: hcloud
flux_bootstrap_hcloud_ccm_timeout: 5m

# Helm values for the hcloud CCM install — matches the Flux HelmRelease.
# networking.enabled: true so the chart sets HCLOUD_NETWORK from the
# Secret "hcloud" key "network" — required for the node controller to
# resolve nodes by their private IPs (10.0.0.x). Without it the CCM
# can only match public IPs and fails to initialize nodes.
# The route controller also runs but is harmless — Cilium VXLAN intercepts
# pod traffic via eBPF before OS routing, so CCM-managed Hetzner routes
# are never consulted (ADR-005 rationale still holds: VXLAN removes the
# *dependency* on CCM routes, not the ability to coexist with them).
# clusterCIDR left at chart default (10.244.0.0/16); Talos assigns /24
# per-node slices from this pool.
flux_bootstrap_hcloud_ccm_values:
  networking:
    enabled: true

# --- Flux bootstrap ---
# Non-secret auth variables are sourced from the generated flux.yml group_vars
# (rendered from config/overrides/cluster.yaml flux: section by render-config):
#   flux_repo_url                   → Git repository URL (required for generic git)
#   flux_repo_branch                → Git branch (default: master)
#   flux_path                       → Cluster directory path (e.g. ./flux/clusters/example)
#   flux_provider                   → generic | github | bitbucket-server
#   flux_auth_mode                  → provider-deploy-key | https-token | ssh-private-key
#   flux_auth_username              → HTTPS basic / Bitbucket API username
#   flux_auth_owner                 → GitHub org/user or Bitbucket project
#   flux_auth_repository            → Repository slug/name
#   flux_auth_hostname              → GitHub Enterprise / Bitbucket Server hostname
#   flux_auth_personal              → --personal flag for provider bootstrap
#   flux_auth_private               → --private flag (default true)
#   flux_auth_read_write_key        → Read-write deploy key (default false)
#   flux_auth_token_auth_bearer     → Bearer token instead of basic auth
#   flux_auth_ssh_hostname          → Non-standard SSH host[:port] for Git
#   flux_auth_private_key_file      → Local SSH private key path (ssh-private-key mode)
#   flux_auth_ca_file               → Custom CA certificate for HTTPS
#   flux_auth_allow_insecure_http   → Allow HTTP connections (development only)
#   flux_auth_silent                → Skip deploy-key confirmation prompt
#
# Secrets (SOPS-backed, NOT rendered from config/):
#   flux_auth_token                  → GITHUB_TOKEN, BITBUCKET_TOKEN, or HTTPS token/password
#   flux_auth_private_key_passphrase → Optional passphrase for encrypted SSH keys
#
# flux_repo_url must be non-empty for generic git flows. For provider-specific
# flows (github, bitbucket-server), the URL is constructed from owner + repository
# and flux_repo_url is advisory / display only.

flux_bootstrap_flux_timeout: 10m

# flux_auth_private_key_passphrase — optional SSH key passphrase, loaded from
# SOPS-backed inventory group vars (NOT a role default). The role references
# this variable with | default('') so it safely evaluates to empty when the
# SOPS file hasn't been created yet. Do not set it here.
