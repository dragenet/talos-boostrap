---
# Late preflight checks (Flux-only): assert the flux CLI tool is available
# and required auth material is configured before any mutating Flux bootstrap
# command.
#
# These run after Cilium / hcloud CCM installation so missing auth config
# does not block pre-Flux components from being installed. Fail-fast is
# preserved at the Flux bootstrap step itself.
#
# All assertions are gated on the idempotency check (helm-controller already
# deployed in flux-system). If Flux is already bootstrapped, none of the
# auth-material assertions fire — the cluster is already operational and
# auth config changes (e.g. removing flux_repo_url after bootstrap) should
# not block re-runs. The idempotency gate in flux.yml still prevents
# re-bootstrap.

# --- Idempotency gate ---
# Check whether Flux controllers are already installed. The helm-controller
# Deployment in flux-system exists only after a successful `flux bootstrap`.
# If present, skip all preflight assertions — the cluster is already bootstrapped
# and does not need auth material to be re-validated. This uses a distinct
# register name from flux.yml's flux_bootstrap_existing to avoid variable
# collision when both files are included from main.yml.

- name: Check if Flux is already bootstrapped (preflight gate)
  ansible.builtin.command:
    argv:
      - kubectl
      - --kubeconfig
      - "{{ flux_bootstrap_kubeconfig }}"
      - get
      - deployment
      - helm-controller
      - --namespace
      - flux-system
      - --ignore-not-found
      - -o
      - name
  register: flux_bootstrap_preflight_existing
  changed_when: false
  failed_when: false

# --- CLI tool checks ---
# Gate on idempotency: flux CLI is not needed if Flux is already bootstrapped.

- name: Check flux is available
  ansible.builtin.command:
    argv:
      - flux
      - version
      - --client
  register: flux_bootstrap_preflight_flux
  changed_when: false
  failed_when: flux_bootstrap_preflight_flux.rc != 0
  when: flux_bootstrap_preflight_existing.stdout | trim | length == 0

# --- Required variable assertions ---
#
# flux_repo_url is set in inventories/common/group_vars/all/flux.yml
# (generated by render-config from config/overrides/cluster.yaml flux.repoUrl).
#
# repoUrl is needed only when the command builder will use it — i.e. when the
# actual bootstrap command is a `flux bootstrap git` variant (which takes --url):
#
#   ssh-private-key        → always uses `flux bootstrap git`     → repoUrl REQUIRED
#   https-token + generic   → uses `flux bootstrap git`            → repoUrl REQUIRED
#   https-token + github/bitbucket-server but owner or repo missing
#                           → falls back to `flux bootstrap git`  → repoUrl REQUIRED
#   provider-deploy-key     → uses `flux bootstrap github / bitbucket-server`
#                             URL from owner+repo                 → repoUrl OPTIONAL
#   https-token + github/bitbucket-server with owner+repo
#                           → uses `flux bootstrap github / bitbucket-server`
#                             URL from owner+repo                 → repoUrl OPTIONAL

- name: Assert flux_repo_url is configured (when required by auth mode)
  ansible.builtin.assert:
    that:
      - flux_repo_url is defined
      - flux_repo_url | string | length > 0
    fail_msg: >-
      flux_repo_url is empty. Set flux.repoUrl in
      config/clusters/{{ config_cluster }}/cluster.yaml,
      then re-run 'ansible-playbook playbooks/render-config.yml'.
  when:
    - flux_bootstrap_preflight_existing.stdout | trim | length == 0
    - >-
      flux_auth_mode == 'ssh-private-key'
      or (
        flux_auth_mode == 'https-token'
        and (
          flux_provider == 'generic'
          or flux_auth_owner | default('') | length == 0
          or flux_auth_repository | default('') | length == 0
        )
      )

# --- Auth material assertions ---
#
# These run before any mutating flux bootstrap command to catch missing secrets
# early. Each assertion gates on both the idempotency check (skip if already
# bootstrapped) and the relevant auth mode/provider combination.
#
# Secrets (flux_auth_token, flux_auth_private_key_passphrase) are SOPS-backed
# and loaded from encrypted inventory group vars.

# provider-deploy-key and https-token modes both require an API token/PAT to
# authenticate to the provider API or HTTPS endpoint.
- name: Assert flux_auth_token is set for token-based auth modes
  ansible.builtin.assert:
    that:
      - flux_auth_token is defined
      - flux_auth_token | string | length > 0
    fail_msg: >-
      flux_auth_token is required for auth mode '{{ flux_auth_mode }}' but is not
      set. Create inventories/common/group_vars/all/flux.sops.yaml with:
        flux_auth_token: "<your-token>"
      and ensure your age public key is listed in .sops.yaml.
  when:
    - flux_bootstrap_preflight_existing.stdout | trim | length == 0
    - flux_auth_mode in ['provider-deploy-key', 'https-token']

# ssh-private-key mode requires a local SSH private key file path.
# The key file must exist on the control machine and be readable.
- name: Assert flux_auth_private_key_file is set for ssh-private-key mode
  ansible.builtin.assert:
    that:
      - flux_auth_private_key_file is defined
      - flux_auth_private_key_file | string | length > 0
    fail_msg: >-
      flux_auth_private_key_file is required for ssh-private-key mode but is not
      set. Set flux.auth.privateKeyFile in config/overrides/cluster.yaml to the
      path of your SSH private key, then re-run render-config.yml.
  when:
    - flux_bootstrap_preflight_existing.stdout | trim | length == 0
    - flux_auth_mode == 'ssh-private-key'

# Bitbucket Server/DC has no default host — --hostname is REQUIRED by
# `flux bootstrap bitbucket-server`. Assert it early so the operator gets
# a clear message instead of a confusing flux CLI error later.
#
# Hostname is only needed when the provider-specific bootstrap command is used
# (`flux bootstrap bitbucket-server`): provider-deploy-key and https-token modes
# with owner+repo set. ssh-private-key mode uses `flux bootstrap git` which does
# not take --hostname, so the gate on auth_mode is essential — otherwise a
# bitbucket-server + ssh-private-key config would fail on a field it never consumes.
- name: Assert flux_auth_hostname is set for bitbucket-server provider
  ansible.builtin.assert:
    that:
      - flux_auth_hostname is defined
      - flux_auth_hostname | string | length > 0
    fail_msg: >-
      flux_auth_hostname is required for bitbucket-server provider but is not set.
      Set flux.auth.hostname in config/overrides/cluster.yaml to your Bitbucket
      Server/DC hostname, then re-run render-config.yml.
  when:
    - flux_bootstrap_preflight_existing.stdout | trim | length == 0
    - flux_provider == 'bitbucket-server'
    - >-
      flux_auth_mode == 'provider-deploy-key'
      or (
        flux_auth_mode == 'https-token'
        and flux_auth_owner | default('') | length > 0
        and flux_auth_repository | default('') | length > 0
      )
