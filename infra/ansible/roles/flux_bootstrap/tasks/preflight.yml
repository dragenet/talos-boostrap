---
# Early preflight checks (pre-Flux): assert CLI tools, CCM secrets, and
# kubeconfig are available before any cluster-touching operations.
#
# Runs before Cilium / hcloud CCM installation so those steps can proceed
# even when flux_repo_url is not yet configured. Flux-specific checks
# (flux CLI, flux_repo_url) live in preflight_flux.yml and run later,
# just before the Flux bootstrap step.

# --- CLI tool checks ---
# Each tool returns a non-zero exit code when absent; the command module
# naturally fails in that case. We use --short/--client to minimise output
# and avoid requiring a running cluster for version checks.

- name: Check kubectl is available
  ansible.builtin.command:
    argv:
      - kubectl
      - version
      - --client
      - --output
      - json
  register: flux_bootstrap_preflight_kubectl
  changed_when: false
  failed_when: flux_bootstrap_preflight_kubectl.rc != 0

- name: Check helm is available
  ansible.builtin.command:
    argv:
      - helm
      - version
      - --short
  register: flux_bootstrap_preflight_helm
  changed_when: false
  failed_when: flux_bootstrap_preflight_helm.rc != 0

# --- Required variable assertions ---

# flux_repo_url is NOT checked here — it lives in preflight_flux.yml so a
# missing repo URL does not block Cilium / CCM installation.

# hcloud_token comes from the SOPS-encrypted hcloud.sops.yaml (Hetzner
# provider inventory only). The CCM cannot install without it because the
# chart reads HCLOUD_TOKEN from the Secret we create in the hcloud_ccm task.
- name: Assert hcloud_token is set when hcloud-ccm is in pre-Flux components
  ansible.builtin.assert:
    that:
      - hcloud_token is defined
      - hcloud_token | string | length > 0
    fail_msg: >-
      hcloud_token is required for hcloud-ccm pre-Flux installation but is not
      set. Ensure inventories/providers/hcloud/group_vars/all/hcloud.sops.yaml
      exists and SOPS can decrypt it (your age key must be in .sops.yaml).
  when: "'hcloud-ccm' in flux_bootstrap_components"

# --- Kubeconfig check ---
# The kubeconfig is generated by bootstrap-talos.yml (talosctl kubeconfig).
# Without it, no Kubernetes operations are possible.

- name: Check kubeconfig exists
  ansible.builtin.stat:
    path: "{{ flux_bootstrap_kubeconfig }}"
  register: flux_bootstrap_preflight_kubeconfig_stat

# Pre-Flux component installs require cluster access. If there are no pre-Flux
# components (cni.name=none, no CCM), the kubeconfig check is advisory.
- name: Fail if kubeconfig missing when pre-Flux components are needed
  ansible.builtin.fail:
    msg: >-
      Kubeconfig not found at {{ flux_bootstrap_kubeconfig }}.
      Run bootstrap-talos.yml first to generate it.
  when:
    - not flux_bootstrap_preflight_kubeconfig_stat.stat.exists
    - flux_bootstrap_components | length > 0

# Verify the cluster API is reachable before attempting any Helm operations.
# Uses kubectl get nodes which works even when nodes are NotReady (e.g.
# before Cilium is installed) — we only care that the apiserver is up.
- name: Verify cluster API is reachable
  ansible.builtin.command:
    argv:
      - kubectl
      - --kubeconfig
      - "{{ flux_bootstrap_kubeconfig }}"
      - get
      - nodes
  register: flux_bootstrap_preflight_nodes
  changed_when: false
  failed_when: flux_bootstrap_preflight_nodes.rc != 0
  when: flux_bootstrap_components | length > 0
