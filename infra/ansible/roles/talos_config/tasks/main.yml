---
# Tasks: generate machine configs per node role, apply to each node,
# bootstrap etcd, wait for health, converge installer image.
#
# Patch model (ADR-016 boundary, ADR-013 compatibility tree):
#   1. Discover ordered .yaml.j2 templates in generated/{all,controlplane,worker,nodes}/
#   2. Render each template to rendered-patches/ inside secrets dir
#   3. Pass them as --config-patch / --config-patch-control-plane /
#      --config-patch-worker to talosctl gen config
#   4. Per-node customisation (hostname, nodeLabels, hybrid scheduling) applied at
#      apply-config time via inline --config-patch (unchanged from pre-refactor).
#   5. Worker-scope patches affect pure worker nodes only; hybrid nodes consume
#      the controlplane config (all + controlplane patches).

- name: Ensure Talos secrets directory exists
  ansible.builtin.file:
    path: "{{ talos_config_secrets_dir }}"
    state: directory
    mode: "0700"

- name: Ensure rendered-patches directory exists
  ansible.builtin.file:
    path: "{{ talos_config_rendered_patches_dir }}"
    state: directory
    mode: "0700"

# --- Discover generated patch templates ---
# Alphabetical order within each directory; later patches win per Talos docs.
# The 05/06/10/15/20/90 numbering controls layering: base/cluster overlays first, then components, then computed integration, then user raw last.

- name: Discover generated all-node patch templates
  ansible.builtin.find:
    paths: "{{ talos_config_generated_all_dir }}"
    patterns: "*.yaml.j2"
    file_type: file
  register: talos_config_discovered_all_patches

- name: Discover generated control-plane patch templates
  ansible.builtin.find:
    paths: "{{ talos_config_generated_cp_dir }}"
    patterns: "*.yaml.j2"
    file_type: file
  register: talos_config_discovered_cp_patches

- name: Discover generated worker patch templates
  ansible.builtin.find:
    paths: "{{ talos_config_generated_worker_dir }}"
    patterns: "*.yaml.j2"
    file_type: file
  register: talos_config_discovered_worker_patches

# --- Render discovered templates ---
# Each .yaml.j2 is rendered to rendered-patches/ with a scope prefix for clarity.
# The rendered files are plain YAML (Jinja expressions resolved).

- name: Render all-node patches to secrets dir
  ansible.builtin.template:
    src: "{{ item.path }}"
    dest: "{{ talos_config_rendered_patches_dir }}/all-{{ item.path | basename | regex_replace('.j2$', '') }}"
    mode: "0600"
  loop: "{{ talos_config_discovered_all_patches.files | sort(attribute='path') }}"
  loop_control:
    label: "{{ item.path | basename }}"

- name: Render control-plane patches to secrets dir
  ansible.builtin.template:
    src: "{{ item.path }}"
    dest: "{{ talos_config_rendered_patches_dir }}/cp-{{ item.path | basename | regex_replace('.j2$', '') }}"
    mode: "0600"
  loop: "{{ talos_config_discovered_cp_patches.files | sort(attribute='path') }}"
  loop_control:
    label: "{{ item.path | basename }}"

- name: Render worker patches to secrets dir
  ansible.builtin.template:
    src: "{{ item.path }}"
    dest: "{{ talos_config_rendered_patches_dir }}/worker-{{ item.path | basename | regex_replace('.j2$', '') }}"
    mode: "0600"
  loop: "{{ talos_config_discovered_worker_patches.files | sort(attribute='path') }}"
  loop_control:
    label: "{{ item.path | basename }}"

# --- Per-node raw patches from nodes.yaml ---
# The config_render role generates per-node .yaml.j2 files under generated/nodes/
# for nodes that have raw patch fragments in nodes.yaml. Discover and render them.

- name: Check if per-node patches directory exists
  ansible.builtin.stat:
    path: "{{ talos_config_generated_nodes_dir }}"
  register: talos_config_nodes_dir_stat

- name: Discover per-node patch templates
  ansible.builtin.find:
    paths: "{{ talos_config_generated_nodes_dir }}"
    patterns: "*.yaml.j2"
    file_type: file
  register: talos_config_discovered_node_patches
  when: talos_config_nodes_dir_stat.stat.exists

- name: Render per-node patches to secrets dir
  ansible.builtin.template:
    src: "{{ item.path }}"
    dest: "{{ talos_config_rendered_patches_dir }}/node-{{ item.path | basename | regex_replace('.j2$', '') }}"
    mode: "0600"
  loop: "{{ talos_config_discovered_node_patches.files | default([]) | sort(attribute='path') }}"
  loop_control:
    label: "{{ item.path | basename }}"
  when: talos_config_discovered_node_patches.files is defined and talos_config_discovered_node_patches.files | length > 0

# Build a dict mapping node names to their --config-patch argv fragments.
# Each node with a rendered per-node patch gets ['--config-patch', '@<path>'].
# Nodes without per-node patches get an empty list (handled by | default([]) at use site).

- name: Initialize per-node raw patch argv dict
  ansible.builtin.set_fact:
    talos_config_node_raw_patches: {}

- name: Populate per-node raw patch argv dict
  ansible.builtin.set_fact:
    talos_config_node_raw_patches: >-
      {{ talos_config_node_raw_patches | combine({
           (item.path | basename | regex_replace('.yaml.j2$', '')):
           ['--config-patch',
            '@' ~ talos_config_rendered_patches_dir ~ '/node-' ~ (item.path | basename | regex_replace('.yaml.j2$', '')) ~ '.yaml']
         }) }}
  loop: "{{ talos_config_discovered_node_patches.files | default([]) | sort(attribute='path') }}"
  loop_control:
    label: "{{ item.path | basename }}"
  when: talos_config_discovered_node_patches.files is defined and talos_config_discovered_node_patches.files | length > 0

# --- Build talosctl gen config command ---
# Start with the base command, then append --config-patch,
# --config-patch-control-plane, and --config-patch-worker flags
# in discovery order. Later flags override earlier ones per-strategic-merge.

- name: Build base gen-config argv
  ansible.builtin.set_fact:
    talos_config_gen_argv:
      - talosctl
      - gen
      - config
      - "{{ cluster_name }}"
      - "{{ cluster_endpoint }}"
      - --with-secrets
      - "{{ talos_config_secrets_file }}"
      - --output-dir
      - "{{ talos_config_secrets_dir }}"
      - --kubernetes-version
      - "{{ talos_config_kubernetes_version }}"

- name: Append all-node --config-patch flags
  ansible.builtin.set_fact:
    talos_config_gen_argv: >-
      {{ talos_config_gen_argv +
         ['--config-patch',
          '@' ~ talos_config_rendered_patches_dir ~ '/all-' ~ (item.path | basename | regex_replace('.j2$', ''))] }}
  loop: "{{ talos_config_discovered_all_patches.files | sort(attribute='path') }}"
  loop_control:
    label: "{{ item.path | basename }}"

- name: Append control-plane --config-patch-control-plane flags
  ansible.builtin.set_fact:
    talos_config_gen_argv: >-
      {{ talos_config_gen_argv +
         ['--config-patch-control-plane',
          '@' ~ talos_config_rendered_patches_dir ~ '/cp-' ~ (item.path | basename | regex_replace('.j2$', ''))] }}
  loop: "{{ talos_config_discovered_cp_patches.files | sort(attribute='path') }}"
  loop_control:
    label: "{{ item.path | basename }}"

- name: Append worker --config-patch-worker flags
  ansible.builtin.set_fact:
    talos_config_gen_argv: >-
      {{ talos_config_gen_argv +
         ['--config-patch-worker',
          '@' ~ talos_config_rendered_patches_dir ~ '/worker-' ~ (item.path | basename | regex_replace('.j2$', ''))] }}
  loop: "{{ talos_config_discovered_worker_patches.files | sort(attribute='path') }}"
  loop_control:
    label: "{{ item.path | basename }}"

- name: Generate Talos secrets bundle
  ansible.builtin.command:
    argv:
      - talosctl
      - gen
      - secrets
      - -o
      - "{{ talos_config_secrets_file }}"
    creates: "{{ talos_config_secrets_file }}"

# --- Regeneration tracking ---
# talosctl gen config uses creates: controlplane.yaml to skip when configs
# already exist. That makes generated patch changes stale on re-runs — editing
# config/clusters/<cluster>/ and re-rendering patches has no effect until the operator
# manually deletes controlplane.yaml. We track a SHA-256 signature of the gen
# inputs (rendered patch file checksums + the full gen argv, which captures
# cluster name, endpoint, kubernetes version, and the ordered patch set) in a
# marker file. When the signature changes we remove the stale generated
# configs (controlplane.yaml, worker.yaml, talosconfig) so the creates: guard
# below lets gen config run again. secrets.yaml is never touched here — it has
# its own creates: guard and rotating it would break the existing cluster's CA.
#
# The signature checksums the RENDERED patch files (in rendered-patches/),
# not the source .yaml.j2 templates under generated/. Source templates contain
# Jinja placeholders like {{ talos_installer_image }} whose value is resolved
# at bootstrap time by the talos_schematic role — the source checksum is
# stable across value changes, so it would miss a talos_version or schematic
# bump. The rendered files have those placeholders resolved, so their
# checksums move when talos_installer_image (or the VIP, certSANs, interface
# name, etc.) changes. This makes the signature cover runtime-rendered inputs.

- name: Build rendered patch file paths for regeneration signature
  ansible.builtin.set_fact:
    # Map each discovered source template to its rendered output path under
    # rendered-patches/, using the same all-/cp-/worker-/node- prefixes the render
    # tasks above write. The list is sorted for deterministic ordering.
    talos_config_rendered_patch_paths: >-
      {%- set paths = [] -%}
      {%- for f in talos_config_discovered_all_patches.files | default([]) -%}
        {%- set _ = paths.append(talos_config_rendered_patches_dir ~ '/all-' ~ (f.path | basename | regex_replace('.j2$', ''))) -%}
      {%- endfor -%}
      {%- for f in talos_config_discovered_cp_patches.files | default([]) -%}
        {%- set _ = paths.append(talos_config_rendered_patches_dir ~ '/cp-' ~ (f.path | basename | regex_replace('.j2$', ''))) -%}
      {%- endfor -%}
      {%- for f in talos_config_discovered_worker_patches.files | default([]) -%}
        {%- set _ = paths.append(talos_config_rendered_patches_dir ~ '/worker-' ~ (f.path | basename | regex_replace('.j2$', ''))) -%}
      {%- endfor -%}
      {%- for f in talos_config_discovered_node_patches.files | default([]) -%}
        {%- set _ = paths.append(talos_config_rendered_patches_dir ~ '/node-' ~ (f.path | basename | regex_replace('.j2$', ''))) -%}
      {%- endfor -%}
      {{ paths | sort }}
  changed_when: false

- name: Stat rendered patch files for regeneration signature
  ansible.builtin.stat:
    path: "{{ item }}"
    checksum_algorithm: sha256
    get_checksum: true
  loop: "{{ talos_config_rendered_patch_paths }}"
  loop_control:
    label: "{{ item | basename }}"
  register: talos_config_patch_stats
  changed_when: false

- name: Compute gen-config input signature
  ansible.builtin.set_fact:
    # Hash the argv (captures cluster name, endpoint, k8s version, ordered
    # patch paths) together with rendered patch file checksums (captures
    # resolved content — talos_installer_image, VIP, certSANs, etc.). to_json
    # gives a deterministic serialisation of the dict; hash('sha256') produces
    # a stable hex digest.
    talos_config_gen_signature: >-
      {{ {
           'argv': talos_config_gen_argv,
           'checksums': talos_config_patch_stats.results | map(attribute='stat.checksum') | list
         } | to_json | hash('sha256') }}
  changed_when: false

- name: Read existing gen-config marker
  ansible.builtin.slurp:
    src: "{{ talos_config_secrets_dir }}/gen-config.signature"
  register: talos_config_gen_marker
  failed_when: false
  changed_when: false
  check_mode: false

- name: Determine whether machine configs need regeneration
  ansible.builtin.set_fact:
    # Regen when the marker is missing (first run) or the signature differs
    # (patch content or argv changed since last successful gen config).
    talos_config_needs_regen: >-
      {{ talos_config_gen_marker is failed
         or (talos_config_gen_marker.content | default('') | b64decode | trim)
            != talos_config_gen_signature }}
  changed_when: false

- name: Remove stale generated machine configs to force regeneration
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - "{{ talos_config_controlplane_config }}"
    - "{{ talos_config_worker_config }}"
    - "{{ talos_config_talosconfig }}"
  when: talos_config_needs_regen

# Generates controlplane.yaml, worker.yaml, and talosconfig into secrets_dir.
# Patch ordering (all-node first, then control-plane, then worker; alphabetical
# within each scope. Later scopes override earlier ones):
#   all/05-base.yaml.j2                     → config/talos/base/all.yaml (template-owned)
#   all/06-cluster.yaml.j2                  → config/clusters/<cluster>/talos/all.yaml (user-owned)
#   all/10-external-cloud-provider.yaml.j2  → external cloud provider (hcloud CCM selected)
#   all/20-install.yaml.j2                  → machine.install.image (+ optional Talos certSANs)
#   all/90-user-raw.yaml.j2                 → raw talos.patches.all fragments (if any)
#   controlplane/05-base.yaml.j2            → config/talos/base/controlplane.yaml (template-owned)
#   controlplane/06-cluster.yaml.j2         → config/clusters/<cluster>/talos/controlplane.yaml (user-owned)
#   controlplane/10-cilium.yaml.j2          → CNI none + proxy disabled (cilium component)
#   controlplane/15-network.yaml.j2         → VIP on private interface
#   controlplane/20-cert-sans.yaml.j2       → kube-apiserver certSANs (if configured)
#   controlplane/90-user-raw.yaml.j2        → raw talos.patches.controlplane fragments (if any)
#   worker/...                              → worker-scope patches (future: node selectors, etc.)
#
# Per-node customisation (hostname, nodeLabels, allowSchedulingOnControlPlanes)
# is applied at apply-config time via --config-patch so each node gets its own.
#
# creates: guards re-generation; the signature logic above removes the stale
# configs when inputs change. To force a full regeneration (e.g. after rotating
# secrets), delete secrets.yaml AND the gen-config.signature marker by hand.
- name: Generate Talos machine configs
  ansible.builtin.command:
    argv: "{{ talos_config_gen_argv }}"
    creates: "{{ talos_config_controlplane_config }}"

# Record the signature of the inputs that produced the current machine configs.
# Written only after gen config succeeds — if gen config fails the playbook
# stops here and the old marker (or none) remains, so the next run retries.
- name: Write gen-config signature marker
  ansible.builtin.copy:
    content: "{{ talos_config_gen_signature }}\n"
    dest: "{{ talos_config_secrets_dir }}/gen-config.signature"
    mode: "0600"
  when: talos_config_needs_regen

# talosctl gen config writes 0644; these embed the cluster CA and client
# certs, so tighten them to owner-only (the secrets dir is already 0700).
- name: Restrict permissions on generated Talos configs
  ansible.builtin.file:
    path: "{{ item }}"
    mode: "0600"
  loop:
    - "{{ talos_config_controlplane_config }}"
    - "{{ talos_config_worker_config }}"
    - "{{ talos_config_talosconfig }}"

# gen config defaults talosconfig endpoints to the cluster endpoint host (the
# private VIP), which isn't reachable from outside the Hetzner private network.
# Point it at the nodes' public IPs instead.
- name: Set talosconfig endpoints to node public IPs
  ansible.builtin.command:
    argv: "{{ ['talosctl', '--talosconfig', talos_config_talosconfig, 'config', 'endpoint'] + talos_config_node_ips }}"
  changed_when: false

- name: Set default talosconfig node to bootstrap node
  ansible.builtin.command:
    argv:
      - talosctl
      - --talosconfig
      - "{{ talos_config_talosconfig }}"
      - config
      - node
      - "{{ hostvars[talos_config_bootstrap_node].node_public_ip }}"
  changed_when: false

# Maintenance-mode nodes reject this (rc!=0, "certificate signed by unknown
# authority" — no config/CA yet). Already-configured nodes normally succeed,
# but a transient apid timeout can also produce rc!=0; retry a few times so
# that doesn't get misread as "still in maintenance mode" below.
- name: Check if machine config already applied
  ansible.builtin.command:
    argv:
      - talosctl
      - --talosconfig
      - "{{ talos_config_talosconfig }}"
      - -n
      - "{{ hostvars[item].node_public_ip }}"
      - get
      - machineconfig
  register: talos_config_mc_check
  until: talos_config_mc_check.rc == 0 or 'certificate signed by unknown authority' in talos_config_mc_check.stderr
  retries: 3
  delay: 5
  failed_when: false
  changed_when: false
  loop: "{{ talos_config_all_nodes }}"

# Per-node inline patches applied at apply-config time:
#   HostnameConfig: sets the node hostname (Talos uses this for the Kubernetes
#     node name; without it all nodes would default to a generic name).
#   nodeLabels: sets node-role.kubernetes.io/<role>="" so Kubernetes sees the
#     correct role label. Talos applies this via its node controller, which can
#     set restricted node-role.kubernetes.io/* labels that kubelet cannot set.
#   allowSchedulingOnControlPlanes (hybrid only): removes the
#     node-role.kubernetes.io/control-plane:NoSchedule taint so workloads
#     can schedule on hybrid nodes. Pure controlplane nodes keep the taint.
#
# These are role-required identity patches — they run AFTER any per-node raw
# patches from nodes.yaml (if present) so that hostname/role labels are never
# accidentally erased by user fragments. This ordering is intentional: user
# per-node overlays can customise their node but must not override the
# cluster-enforced identity (hostname, node labels, hybrid scheduling).
# Per-node worker overlays (future: from config/clusters/kube1/talos/nodes/)
# follow the same rule — they apply before these identity patches.
- name: Apply machine config to nodes in maintenance mode
  ansible.builtin.command:
    argv: >-
      {{ (['talosctl', 'apply-config', '--insecure',
           '-n', hostvars[item.item].node_public_ip,
           '--file',
           talos_config_controlplane_config
           if hostvars[item.item].node_role in ['controlplane', 'hybrid']
           else talos_config_worker_config]
          + talos_config_node_raw_patches[item.item] | default([])
           + ['--config-patch',
              '{"apiVersion":"v1alpha1","kind":"HostnameConfig","hostname":"' ~ item.item ~ '","auto":"off"}',
              '--config-patch',
              '{"machine":{"nodeLabels":{"node-role.kubernetes.io/' ~ hostvars[item.item].node_role ~ '":""}}}']
           + (['--config-patch', '{"cluster":{"allowSchedulingOnControlPlanes":true}}']
              if hostvars[item.item].node_role == 'hybrid' else [])) }}
  loop: "{{ talos_config_mc_check.results }}"
  loop_control:
    label: "{{ item.item }}"
  when: item.rc != 0 and 'certificate signed by unknown authority' in item.stderr
  changed_when: true

# Re-apply machine config to already-running nodes so that re-running
# bootstrap-talos.yml picks up config changes (Kubernetes version bump,
# extensions change, nodeLabels update, etc.).
# --mode=no-reboot: applies live where possible. If a change requires a reboot
# (e.g. kernel param), Talos will report it and the operator should then run
# upgrade-talos.yml or reboot manually.
# apply-config produces no diff output, so changed_when is unconditional here.
- name: Re-apply machine config to running nodes
  ansible.builtin.command:
    argv: >-
      {{ (['talosctl', 'apply-config',
           '--mode', 'no-reboot',
           '-n', hostvars[item.item].node_public_ip,
           '--talosconfig', talos_config_talosconfig,
           '--file',
           talos_config_controlplane_config
           if hostvars[item.item].node_role in ['controlplane', 'hybrid']
           else talos_config_worker_config]
          + talos_config_node_raw_patches[item.item] | default([])
           + ['--config-patch',
              '{"apiVersion":"v1alpha1","kind":"HostnameConfig","hostname":"' ~ item.item ~ '","auto":"off"}',
              '--config-patch',
              '{"machine":{"nodeLabels":{"node-role.kubernetes.io/' ~ hostvars[item.item].node_role ~ '":""}}}']
           + (['--config-patch', '{"cluster":{"allowSchedulingOnControlPlanes":true}}']
              if hostvars[item.item].node_role == 'hybrid' else [])) }}
  loop: "{{ talos_config_mc_check.results }}"
  loop_control:
    label: "{{ item.item }}"
  when: item.rc == 0
  changed_when: true

- name: Bootstrap etcd
  ansible.builtin.command:
    argv:
      - talosctl
      - bootstrap
      - -n
      - "{{ hostvars[talos_config_bootstrap_node].node_public_ip }}"
      - --talosconfig
      - "{{ talos_config_talosconfig }}"
  register: talos_config_bootstrap_result
  failed_when: false
  changed_when: talos_config_bootstrap_result.rc == 0

- name: Show bootstrap result if it failed (likely already bootstrapped)
  ansible.builtin.debug:
    var: talos_config_bootstrap_result.stderr
  when: talos_config_bootstrap_result.rc != 0

# No -n/--control-plane-nodes: etcd registers members by their private IPs
# (10.0.0.x), not the public IPs used to reach apid, so passing public IPs to
# --control-plane-nodes fails with "etcd member ips [...] are not subset of
# control plane node ips [...]". Without overrides, talosctl uses the
# talosconfig's default node/endpoints, discovers the other members via etcd,
# and proxies per-node checks through that node's apid.
# talosctl health always tries to direct-dial discovered etcd member IPs
# (private network) — unreachable from outside Hetzner's private network.
# Replace it with targeted commands that route through the public-IP endpoint.

# etcd status proxies through the bootstrap node's public IP and checks quorum.
- name: Wait for etcd to be healthy
  ansible.builtin.command:
    argv:
      - talosctl
      - -n
      - "{{ hostvars[talos_config_bootstrap_node].node_public_ip }}"
      - --talosconfig
      - "{{ talos_config_talosconfig }}"
      - etcd
      - status
  register: talos_config_etcd_status
  until: talos_config_etcd_status.rc == 0
  retries: 30
  delay: 20
  changed_when: false

# Confirms apid is up on each node and the node has finished booting.
- name: Wait for all nodes to be reachable via talosctl
  ansible.builtin.command:
    argv:
      - talosctl
      - -n
      - "{{ item }}"
      - --talosconfig
      - "{{ talos_config_talosconfig }}"
      - version
  register: talos_config_node_reachable
  until: talos_config_node_reachable.rc == 0
  retries: 30
  delay: 20
  loop: "{{ talos_config_node_ips }}"
  changed_when: false

- name: Fetch kubeconfig
  ansible.builtin.command:
    argv:
      - talosctl
      - kubeconfig
      - "{{ talos_config_kubeconfig }}"
      - -n
      - "{{ hostvars[talos_config_bootstrap_node].node_public_ip }}"
      - --talosconfig
      - "{{ talos_config_talosconfig }}"
      - --force
  changed_when: true

- name: Restrict permissions on kubeconfig
  ansible.builtin.file:
    path: "{{ talos_config_kubeconfig }}"
    mode: "0600"

# Image convergence: check every node's running installer image and upgrade
# any that don't match the factory target. Key for manual nodes booted from a
# generic Talos ISO. hcloud nodes that booted from the snapshot are normally a
# no-op. talosctl upgrade is etcd-quorum aware and reboots the node.
# For intentional version upgrades (talos_version / talos_extensions change),
# use upgrade-talos.yml which sequences one node at a time with health checks.
- name: Read running installer image from each node
  ansible.builtin.command:
    argv:
      - talosctl
      - get
      - machineconfig
      - --nodes
      - "{{ hostvars[item].node_public_ip }}"
      - --talosconfig
      - "{{ talos_config_talosconfig }}"
      - -o
      - "jsonpath={.spec.machine.install.image}"
  register: talos_config_running_images
  loop: "{{ talos_config_all_nodes }}"
  loop_control:
    label: "{{ item }}"
  changed_when: false
  failed_when: false
  check_mode: false

- name: Upgrade node to factory installer image if running image differs
  ansible.builtin.command:
    argv:
      - talosctl
      - upgrade
      - --nodes
      - "{{ hostvars[item.item].node_public_ip }}"
      - --talosconfig
      - "{{ talos_config_talosconfig }}"
      - --image
      - "{{ talos_installer_image }}"
      - --wait
  loop: "{{ talos_config_running_images.results }}"
  loop_control:
    label: "{{ item.item }}"
  when: item.rc == 0 and (item.stdout | trim) != talos_installer_image
  changed_when: true
