---
# config_render role defaults.
#
# Paths are anchored to playbook_dir (infra/ansible/playbooks/) so the role
# works from any playbook at that depth. The config/ directory lives at the
# repo root, two levels above infra/ansible/.

# Repo root — three levels above the playbook directory.
# playbook_dir = infra/ansible/playbooks → ../../.. = repo root.
config_render_repo_root: "{{ playbook_dir }}/../../.."

# Config input paths (user/template-owned).
config_render_defaults_path: "{{ config_render_repo_root }}/config/defaults/cluster.yaml"
config_render_overrides_path: "{{ config_render_repo_root }}/config/overrides/cluster.yaml"
config_render_nodes_path: "{{ config_render_repo_root }}/config/overrides/nodes.yaml"

# Generated output paths (render-owned).
config_render_output_common: "{{ config_render_repo_root }}/infra/ansible/inventories/common/group_vars/all"
config_render_output_hcloud: "{{ config_render_repo_root }}/infra/ansible/inventories/providers/hcloud/group_vars/all"
config_render_output_manual: "{{ config_render_repo_root }}/infra/ansible/inventories/providers/manual/group_vars/all"

# Generated Talos patch output path (render-owned, ADR-013 layered model).
# Patches are generated under infra/talos/patches/generated/ with subdirectories
# for scope: all/ (all nodes), controlplane/ (control-plane only), and
# optional per-node directories.
config_render_output_talos_patches: "{{ config_render_repo_root }}/infra/talos/patches/generated"

# Check/drift mode: when true, render to a temp directory and diff against
# committed generated files instead of writing in-place.
config_render_check: false

# Generated file header — marks files as render-owned (ADR-011 one-writer).
config_render_header: "# Generated by render-config; do not edit."
