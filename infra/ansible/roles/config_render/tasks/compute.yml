---
# Compute derived values from the merged configuration.
#
# These are computed keys (ADR-011) — they cannot be set directly in overrides.
# The render derives them from feature flags, provider, and extension lists.

# --- talos_extensions ---
# Computed: talos.extensions.base ∪ feature-implied extensions ∪ talos.extensions.extra
# Feature-implied extensions are currently empty (no feature adds Talos extensions
# in the initial migration); the hook is here for future use.

- name: Compute feature-implied Talos extensions
  ansible.builtin.set_fact:
    config_render_feature_extensions: >-
      {{ [] }}

- name: Compute final talos_extensions list
  ansible.builtin.set_fact:
    config_render_talos_extensions: >-
      {{ (config_render_merged.talos.extensions.base | default([]))
         + config_render_feature_extensions
         + (config_render_merged.talos.extensions.extra | default([])) }}

# --- bootstrap_pre_flux_components ---
# Computed from cni.name + cloud_controller_manager.enabled + provider (ADR-010).
# cilium  → included when cni.name == 'cilium' (the pre-Flux CNI install).
# hcloud-ccm → included ONLY when the CCM tri-state resolves to enabled AND
#              provider is hcloud AND cni.name=cilium. The CCM clears the
#              uninitialized node taint and sets providerID/topology labels.
# manual: [cilium] when cni.name=cilium, [] when cni.name=none.
# hcloud: [cilium] when cni.name=cilium; hcloud-ccm appended when CCM resolves
#         enabled (auto→true for hcloud, or explicit true).
# Empty list when cni.name=none and CCM resolves disabled.

- name: Resolve cloud_controller_manager tri-state (auto → boolean)
  ansible.builtin.set_fact:
    config_render_ccm_resolved: >-
      {{
        true
        if config_render_merged.cloud_controller_manager.enabled == true
        or config_render_merged.cloud_controller_manager.enabled == 'auto'
        else false
      }}
  # auto resolves to true only for providers with a supported CCM.
  # hcloud is the only provider with CCM support today; manual/bare-metal
  # falls through to false (no CCM to clear the uninitialized taint).
  when: >-
    config_render_merged.cloud_controller_manager.enabled != 'auto'
    or config_render_merged.provider.name == 'hcloud'

- name: Resolve cloud_controller_manager tri-state (auto → disabled for unsupported provider)
  ansible.builtin.set_fact:
    config_render_ccm_resolved: false
  when: >-
    config_render_merged.cloud_controller_manager.enabled == 'auto'
    and config_render_merged.provider.name != 'hcloud'

- name: Compute bootstrap_pre_flux_components
  ansible.builtin.set_fact:
    config_render_bootstrap_pre_flux_components: >-
      {{
        (['cilium'] if config_render_merged.cni.name == 'cilium' else [])
        + (['hcloud-ccm']
           if (config_render_ccm_resolved | default(false) | bool
               and config_render_merged.provider.name == 'hcloud'
               and config_render_merged.cni.name == 'cilium')
           else [])
      }}

# --- config_render_talos_components ---
# ADR-016: ordered list of shared Talos component manifest names selected from
# config/talos/components/ based on feature flags. Each entry maps to a source
# file config/talos/components/<name>.yaml.
#
# Matches the bootstrap_pre_flux_components logic but tracks Talos-side
# components rather than Flux-side Helm releases. The two lists are separate
# because not every Flux component has a Talos-side counterpart and vice versa.
# Initial mapping:
#   cni.name == cilium         → includes 'cilium'
#   hcloud CCM resolved true   → includes 'external-cloud-provider'
#   features.hcloudCsi == true → (deferred) would include 'hcloud-csi'
#   features.certManager       → (deferred) may include 'cert-manager' Talos config
#
# The list is ordered to reflect the recommended component layering:
# earlier components apply first, later components override where they conflict.
# Per-node overlays always apply last (handled in render_talos.yml).

- name: Compute selected Talos components
  ansible.builtin.set_fact:
    config_render_talos_components: >-
      {{
        (['cilium'] if config_render_merged.cni.name == 'cilium' else [])
        + (['external-cloud-provider']
           if (config_render_ccm_resolved | default(false) | bool
               and config_render_merged.provider.name == 'hcloud'
               and config_render_merged.cni.name == 'cilium')
           else [])
      }}

# --- cluster_external_cloud_provider_enabled ---
# Computed: true iff the CCM tri-state resolved to enabled AND provider has a
# supported CCM AND the provider-specific CCM component is in the pre-Flux set.
# When true the render emits a Talos all-node patch setting
# cluster.externalCloudProvider so kubelet and kube-controller-manager run with
# --cloud-provider=external and the CCM can initialise nodes (set providerID,
# clear the node.cloudprovider.kubernetes.io/uninitialized taint, attach
# topology labels).
#
# Derived from the pre-Flux list rather than the raw config value alone so the
# flag tracks the actual CCM selection: if hcloud-ccm is ever removed from the
# pre-Flux set (e.g. CCM flips back to false, or auto resolves to disabled),
# externalCloudProvider is disabled too, avoiding the "uninitialized taint with
# no CCM to clear it" failure mode. Manual/bare-metal providers never set this —
# there is no CCM to clear the taint, so enabling it would permanently taint
# nodes and block scheduling.

- name: Compute cluster_external_cloud_provider_enabled
  ansible.builtin.set_fact:
    config_render_cluster_external_cloud_provider_enabled: >-
      {{ 'hcloud-ccm' in config_render_bootstrap_pre_flux_components }}

# --- talos_installer_image (placeholder) ---
# The real value is resolved at runtime by talos_schematic role via factory.
# We set a placeholder here so generated group_vars document the pattern;
# the actual value is only available after talos_schematic runs.
# This is NOT the schematic ID — that requires a live factory POST.

- name: Set path facts for generated group_vars
  ansible.builtin.set_fact:
    # These paths are anchored to playbook_dir, matching the pre-refactor
    # convention. They are NOT schema-driven — they are Ansible runtime paths
    # that depend on where the consuming playbook lives.
    config_render_talos_secrets_dir: "{{ playbook_dir }}/../talos/secrets"
    config_render_talos_patches_dir: "{{ playbook_dir }}/../talos/patches"

# --- cluster_endpoint ---
# Computed from cluster.vip if not explicitly overridden.

- name: Compute cluster_endpoint from vip
  ansible.builtin.set_fact:
    config_render_cluster_endpoint: >-
      {{ config_render_merged.cluster.endpoint
         if config_render_merged.cluster.endpoint | default('') | length > 0
            and '{{ cluster_vip }}' not in config_render_merged.cluster.endpoint
         else 'https://' ~ config_render_merged.cluster.vip ~ ':6443' }}

# --- config_render_flux_features ---
# Post-bootstrap Flux-only catalog entries (ADR-017 generated/selected layer).
# SEPARATE from config_render_bootstrap_pre_flux_components (which is pre-Flux
# Ansible-managed Helm releases). Each feature here renders a catalog path into
# flux/infrastructure/controllers/generated/selected/kustomization.yaml.
#
# Extension point: future cert-manager, ingress (envoy-gateway/traefik), and
# hcloud-csi add entries here — NOT in bootstrap_pre_flux_components.
# openebs → ../../_components/openebs (Talos-coupled: also renders kernel-module
# and RawVolumeConfig patches, gated on config_render_openebs_enabled).
- name: Compute post-bootstrap Flux feature list
  ansible.builtin.set_fact:
    config_render_flux_features: >-
      {{
        (['openebs'] if config_render_merged.features.openebs | default(false) | bool else [])
        + (['cert-manager'] if config_render_merged.features.certManager | default(false) | bool else [])
        + (['envoy-gateway']
           if config_render_merged.features.ingress == 'envoy-gateway' else [])
      }}

# --- Storage volume derived facts ---
# config_render_storage_raw_volumes: only volumes with type == 'raw' (drives
# RawVolumeConfig render; on kube1 today all volumes are raw).
# config_render_openebs_enabled: convenience bool gating kernel-module patch
# + RawVolumeConfig + Flux catalog entry.
- name: Compute storage raw volumes list
  ansible.builtin.set_fact:
    config_render_storage_raw_volumes: >-
      {{
        config_render_merged.storage.volumes | default([])
        | selectattr('type', 'equalto', 'raw')
        | list
      }}

- name: Compute openebs enabled flag
  ansible.builtin.set_fact:
    config_render_openebs_enabled: >-
      {{ config_render_merged.features.openebs | default(false) | bool }}
