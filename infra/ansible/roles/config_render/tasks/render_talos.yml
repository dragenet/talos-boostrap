# --- 06-cluster: config/clusters/<cluster>/talos/worker.yaml (skip if comment-only) ---
# Gracefully handles missing selected-cluster tree (legacy config/overrides/ path).

- name: Stat cluster worker overlay source
  ansible.builtin.stat:
    path: "{{ config_render_cluster_talos_dir }}/worker.yaml"
  register: config_render_cluster_worker_stat
  check_mode: false

- name: Read cluster worker overlay source
