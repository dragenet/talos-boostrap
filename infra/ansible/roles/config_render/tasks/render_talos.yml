- name: Remove stale cluster worker overlay when source is empty
  ansible.builtin.file:
    path: "{{ config_render_talos_patches_out }}/worker/06-cluster.yaml.j2"
    state: absent
  when: >-
     (config_render_cluster_worker_raw.content | b64decode | from_yaml_all
     | select('ne', none) | reject('equalto', {}) | list | length == 0)

# --- Worker directory sentinel (.gitkeep) ---
# When both base and cluster worker overlays are comment-only/empty (the common
# case for hybrid-only clusters like kube1), the worker/ output directory would
# otherwise have no generated patch files. An empty untracked directory causes
# check-mode diff drift ("Only in <temp>: .../worker" from diff -ru). Rendering
# a .gitkeep makes the directory commit-stable so both the committed tree and
# the temp render output contain the same tracked sentinel — clean-checkout
# diffs stay clean. Remove the .gitkeep when real worker patches are rendered
# so stale sentinel files don't accumulate.

- name: Check if worker output directory has generated patches
  ansible.builtin.find:
    paths: "{{ config_render_talos_patches_out }}/worker"
    patterns: "*.yaml.j2"
    file_type: file
  register: config_render_worker_files
  check_mode: false

- name: Render worker .gitkeep when no patches are generated
  ansible.builtin.copy:
    content: |
      {{ config_render_header }}
      # Placeholder — no worker-scope patches are generated on this cluster
      # (all nodes are hybrid, or both worker base and cluster overlays are
      # empty). This .gitkeep keeps the directory commit-stable so
      # clean-checkout check-mode diffs don't report phantom drift.
    dest: "{{ config_render_talos_patches_out }}/worker/.gitkeep"
    mode: "0644"
  when: config_render_worker_files.files | length == 0

- name: Remove stale .gitkeep when worker patches are generated
  ansible.builtin.file:
    path: "{{ config_render_talos_patches_out }}/worker/.gitkeep"
    state: absent
  when: config_render_worker_files.files | length > 0

# ===========================================================================
# PER-NODE PATCHES (--config-patch <node>)
# ===========================================================================
# Sources (ADR-016 staged migration):
#   Primary:   config/clusters/<cluster>/talos/nodes/<node>.yaml (Talos-shaped)
#   Fallback:  nodes.yaml[].patch (legacy raw fragments, deprecated)
# Both produce output in generated/nodes/<node>.yaml.j2.

# --- New path: per-node Talos manifests ---
# Gracefully handles missing selected-cluster tree (legacy config/overrides/ path).

- name: Stat per-node Talos overlay directory
  ansible.builtin.stat:
    path: "{{ config_render_cluster_talos_nodes_dir }}"
  register: config_render_talos_nodes_dir_stat
  check_mode: false

- name: Discover per-node Talos overlay manifests
  ansible.builtin.find:
    paths: "{{ config_render_cluster_talos_nodes_dir }}"
    patterns: "*.yaml"
    file_type: file
    excludes: ".gitkeep"
  register: config_render_talos_node_sources
  check_mode: false
  when: config_render_talos_nodes_dir_stat.stat.exists | default(false)

- name: Set empty per-node sources when directory missing
  ansible.builtin.set_fact:
    config_render_talos_node_sources:
      files: []
  when: not (config_render_talos_nodes_dir_stat.stat.exists | default(false))

- name: Compute nodes from Talos overlay manifest filenames
  ansible.builtin.set_fact:
    config_render_talos_node_names: >-
      {{
        config_render_talos_node_sources.files
        | default([])
        | map(attribute='path')
        | map('basename')
        | map('regex_replace', '.yaml$', '')
        | list
      }}

- name: Ensure generated/nodes directory exists
  ansible.builtin.file:
    path: "{{ config_render_talos_patches_out }}/nodes"
    state: directory
    mode: "0755"
  when: >-
    (config_render_talos_node_sources.files | default([]) | length > 0)
    or (config_render_nodes_list | default([]) | length > 0)

- name: Copy per-node Talos overlay manifests to generated tree
  ansible.builtin.copy:
    content: |
      {{ config_render_header }}
      # Source: config/clusters/{{ config_cluster }}/talos/nodes/{{ item.path | basename }}
      # Per-node Talos overlay for {{ (item.path | basename | regex_replace('.yaml$', '')) }}.
      # Applied as --config-patch at apply-config time BEFORE role-required
      # patches (hostname, nodeLabels, hybrid scheduling). Order is deliberate:
      # role-required identity patches run last so they win (later patches win
      # per Talos docs).
      {{ '{% raw %}' }}
      {{ lookup('ansible.builtin.file', item.path) }}
      {{ '{% endraw %}' }}
    dest: "{{ config_render_talos_patches_out }}/nodes/{{ item.path | basename }}.j2"
    mode: "0644"
  loop: "{{ config_render_talos_node_sources.files | default([]) }}"
  loop_control:
    label: "{{ item.path | basename }}"
  when: config_render_talos_node_sources.files | default([]) | length > 0

# --- Legacy fallback: nodes.yaml[].patch raw fragments ---

- name: Compute nodes with raw patches (legacy fallback)
  ansible.builtin.set_fact:
    config_render_nodes_with_patches: >-
      {{
        config_render_nodes_list
        | selectattr('patch', 'defined')
        | rejectattr('patch', 'none')
        | rejectattr('patch', 'equalto', [])
        | rejectattr('name', 'in', config_render_talos_node_names | default([]))
        | list
      }}
  # Nodes that already have a Talos overlay manifest in
  # config/clusters/<cluster>/talos/nodes/<name>.yaml are excluded from legacy
  # rendering — the new overlay wins per ADR-016 staged migration. The legacy
  # fallback only renders nodes that have NO corresponding Talos overlay file.

- name: Render legacy per-node patch files
  ansible.builtin.copy:
    content: |
      {{ config_render_header }}
      {{ '{% raw %}' }}
      ---
      # Layer 2 raw fragments: per-node patches for {{ item.name }}.
      # Source: nodes.yaml (nodes[?name == '{{ item.name }}'].patch) — DEPRECATED.
      # Migrate this content to config/clusters/{{ config_cluster }}/talos/nodes/{{ item.name }}.yaml
      # as a Talos-shaped machine config patch manifest (ADR-016).
      #
      # Applied as --config-patch at apply-config time BEFORE role-required
      # patches (hostname, nodeLabels, hybrid scheduling). Order is deliberate:
      # role-required identity patches run last so they win (later patches win
      # per Talos docs) and user raw fragments cannot accidentally erase
      # hostname/role labels.
      {% set raw_fragments = item.patch if (item.patch is iterable and item.patch is not string and item.patch is not mapping) else [item.patch] %}
      {% for fragment in raw_fragments %}
      {{ fragment }}
      {% endfor %}
      {{ '{% endraw %}' }}
    dest: "{{ config_render_talos_patches_out }}/nodes/{{ item.name }}.yaml.j2"
    mode: "0644"
  loop: "{{ config_render_nodes_with_patches }}"
  loop_control:
    label: "{{ item.name }}"
  when: config_render_nodes_with_patches | length > 0

# --- Clean up stale per-node patch files ---
# Remove generated node patches whose source no longer exists (neither
# as a Talos overlay manifest nor as a legacy nodes.yaml entry).

- name: Check if nodes directory exists
  ansible.builtin.stat:
    path: "{{ config_render_talos_patches_out }}/nodes"
  register: config_render_nodes_dir_stat

- name: Discover existing per-node patch files
  ansible.builtin.find:
    paths: "{{ config_render_talos_patches_out }}/nodes"
    patterns: "*.yaml.j2"
    file_type: file
  register: config_render_existing_node_patches
  when: config_render_nodes_dir_stat.stat.exists

- name: Compute known node names (new Talos overlays + legacy patches)
  ansible.builtin.set_fact:
    config_render_known_node_names: >-
      {{
        (config_render_talos_node_names | default([]))
        + (config_render_nodes_with_patches | default([]) | map(attribute='name') | list)
      }}

- name: Remove stale per-node patch files
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ config_render_existing_node_patches.files | default([]) }}"
  loop_control:
    label: "{{ item.path | basename }}"
  when:
    - config_render_existing_node_patches.files is defined
    - (item.path | basename | regex_replace('.yaml.j2$', ''))
      not in config_render_known_node_names
