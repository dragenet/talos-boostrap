---
# Render Talos patch templates/fragments (ADR-016 layered model).
#
# Composes the final Talos patch stack from ADR-016 sources:
#   1. config/talos/base/<scope>.yaml           (template-owned base)
#   2. config/clusters/<cluster>/talos/<scope>.yaml  (user-owned cluster overlay)
#   3. selected config/talos/components/*.yaml  (feature-gated components)
#   4. computed integration fragments           (Ansible must compute/enforce these)
#   5. config/clusters/<cluster>/talos/nodes/*.yaml  (per-node overlays)
#   6. legacy talos.patches.* raw fragments     (deprecated, kept for compatibility)
#
# Numeric prefixes encode the layering order (lower = applied first). Later
# patches win per Talos strategic-merge docs. Computed integration fragments
# (install image, VIP network, cert SANs) are placed AFTER base/cluster/component
# overlays so they cannot be overridden by user-written configs.
#
# Output layout (consumed by talos_config role):
#   generated/all/           — applied to all node types (--config-patch)
#   generated/controlplane/  — applied to control-plane only (--config-patch-control-plane)
#   generated/worker/        — applied to worker-only nodes (--config-patch-worker)
#   generated/nodes/         — per-node patches (--config-patch <node>)
#
# Empty/comment-only source manifests (base & cluster overlays) are skipped:
# they produce no effective patch content and would only clutter the tree.

# --- Determine output directory (in-place or temp for check mode) ---
# config_render_output_base is set by render_ansible.yml (runs before this).

- name: Set Talos patches output directory
  ansible.builtin.set_fact:
    config_render_talos_patches_out: "{{ config_render_output_base }}/infra/talos/patches/generated"

# --- Create output directories ---

- name: Ensure generated/all directory exists
  ansible.builtin.file:
    path: "{{ config_render_talos_patches_out }}/all"
    state: directory
    mode: "0755"

- name: Ensure generated/controlplane directory exists
  ansible.builtin.file:
    path: "{{ config_render_talos_patches_out }}/controlplane"
    state: directory
    mode: "0755"

- name: Ensure generated/worker directory exists
  ansible.builtin.file:
    path: "{{ config_render_talos_patches_out }}/worker"
    state: directory
    mode: "0755"

# ===========================================================================
# ALL-NODE PATCHES (--config-patch)
# ===========================================================================
# Order: 05-base → 06-cluster → 10-components → 20-computed-install → 90-user-raw

# --- 20-install: computed integration fragment ---
# Install image placeholder (resolved at bootstrap time by talos_schematic role)
# plus optional Talos API certSANs from cluster.certSANs.talos.
# Placed after 05-base/06-cluster so the computed install image wins
# over any user overlay that might set machine.install.*.

- name: Render all-node install patch (20-install.yaml.j2)
  ansible.builtin.template:
    src: talos_patches/all/00-install.yaml.j2
    dest: "{{ config_render_talos_patches_out }}/all/20-install.yaml.j2"
    mode: "0644"

# --- 05-base: config/talos/base/all.yaml (skip if comment-only) ---

- name: Read base all overlay source
  ansible.builtin.slurp:
    src: "{{ config_render_talos_base_dir }}/all.yaml"
  register: config_render_base_all_raw
  check_mode: false

# Human-authored source manifest — raw-wrapped so literal {{ }} and {% %} in
# the Talos-shaped content survive later Jinja templating in talos_config.
# Computed integration fragments (install, network, cert-sans) remain real templates.
- name: Copy base all overlay to generated tree (05-base.yaml.j2)
  ansible.builtin.copy:
    content: |
      {{ config_render_header }}
      # Source: config/talos/base/all.yaml (template-owned, cluster-agnostic)
      {{ '{% raw %}' }}
      {{ config_render_base_all_raw.content | b64decode }}
      {{ '{% endraw %}' }}
    dest: "{{ config_render_talos_patches_out }}/all/05-base.yaml.j2"
    mode: "0644"
  when: >-
    (config_render_base_all_raw.content | b64decode | from_yaml_all
     | select('ne', none) | reject('equalto', {}) | list | length > 0)

- name: Remove stale base all overlay when source is empty
  ansible.builtin.file:
    path: "{{ config_render_talos_patches_out }}/all/05-base.yaml.j2"
    state: absent
  when: >-
    (config_render_base_all_raw.content | b64decode | from_yaml_all
     | select('ne', none) | reject('equalto', {}) | list | length == 0)

# --- 06-cluster: config/clusters/<cluster>/talos/all.yaml (skip if comment-only) ---
# Gracefully handles missing selected-cluster tree (legacy config/overrides/ path).

- name: Stat cluster all overlay source
  ansible.builtin.stat:
    path: "{{ config_render_cluster_talos_dir }}/all.yaml"
  register: config_render_cluster_all_stat
  check_mode: false

- name: Read cluster all overlay source
  ansible.builtin.slurp:
    src: "{{ config_render_cluster_talos_dir }}/all.yaml"
  register: config_render_cluster_all_raw
  check_mode: false
  when: config_render_cluster_all_stat.stat.exists

- name: Set empty cluster all overlay when file missing
  ansible.builtin.set_fact:
    config_render_cluster_all_raw:
      content: ""
      encoding: base64
  when: not config_render_cluster_all_stat.stat.exists

- name: Copy cluster all overlay to generated tree (06-cluster.yaml.j2)
  ansible.builtin.copy:
    content: |
      {{ config_render_header }}
      # Source: config/clusters/{{ config_cluster }}/talos/all.yaml (user-owned)
      {{ '{% raw %}' }}
      {{ config_render_cluster_all_raw.content | b64decode }}
      {{ '{% endraw %}' }}
    dest: "{{ config_render_talos_patches_out }}/all/06-cluster.yaml.j2"
    mode: "0644"
  when: >-
    (config_render_cluster_all_raw.content | b64decode | from_yaml_all
     | select('ne', none) | reject('equalto', {}) | list | length > 0)

- name: Remove stale cluster all overlay when source is empty
  ansible.builtin.file:
    path: "{{ config_render_talos_patches_out }}/all/06-cluster.yaml.j2"
    state: absent
  when: >-
    (config_render_cluster_all_raw.content | b64decode | from_yaml_all
     | select('ne', none) | reject('equalto', {}) | list | length == 0)

# --- 10-components: selected config/talos/components/<name>.yaml ---
# Each selected component is copied verbatim to the generated tree with a
# stable numeric prefix encoding its position in the component order.
# Component names are mapped to all-scope or controlplane-scope by the
# component registry below.

- name: Read external-cloud-provider component source (all scope)
  ansible.builtin.slurp:
    src: "{{ config_render_talos_components_dir }}/external-cloud-provider.yaml"
  register: config_render_comp_ecp_raw
  check_mode: false
  when: "'external-cloud-provider' in config_render_talos_components"

- name: Copy external-cloud-provider component to generated all tree
  ansible.builtin.copy:
    content: |
      {{ config_render_header }}
      # Source: config/talos/components/external-cloud-provider.yaml
      # Selected by: cloud_controller_manager.enabled + provider.name + cni.name
      {{ '{% raw %}' }}
      {{ config_render_comp_ecp_raw.content | b64decode }}
      {{ '{% endraw %}' }}
    dest: "{{ config_render_talos_patches_out }}/all/10-external-cloud-provider.yaml.j2"
    mode: "0644"
  when: "'external-cloud-provider' in config_render_talos_components"

- name: Remove stale external-cloud-provider component when not selected
  ansible.builtin.file:
    path: "{{ config_render_talos_patches_out }}/all/10-external-cloud-provider.yaml.j2"
    state: absent
  when: "'external-cloud-provider' not in config_render_talos_components"

# --- Clean up old generated filenames from ADR-013 migration ---
# These files were rendered by the old templates (all/10-cloud-provider.yaml.j2
# and controlplane/10-cni-proxy.yaml.j2) replaced by ADR-016 component sources.
# Remove them unconditionally — they are dead code whether components are
# selected or not. If a component re-selection is wanted later, the new component
# file will be re-rendered.
#
# Also clean up old prefix filenames (all/00-install.yaml.j2,
# controlplane/00-network.yaml.j2) that were renamed to keep computed
# integration fragments after base/cluster overlays (ADR-016 ordering fix).

- name: Remove stale ADR-013 cloud-provider patch (replaced by component)
  ansible.builtin.file:
    path: "{{ config_render_talos_patches_out }}/all/10-cloud-provider.yaml.j2"
    state: absent

- name: Remove stale ADR-013 CNI/proxy patch (replaced by component + cert-sans)
  ansible.builtin.file:
    path: "{{ config_render_talos_patches_out }}/controlplane/10-cni-proxy.yaml.j2"
    state: absent

- name: Remove stale all-node install patch at old 00 prefix (renamed to 20)
  ansible.builtin.file:
    path: "{{ config_render_talos_patches_out }}/all/00-install.yaml.j2"
    state: absent

# --- Clean up old generated controlplane network filename (ADR-016 prefix reorder) ---
# The computed network patch was at 00-network, which let base/cluster overlays
# override it (later patches win). Now at 15-network so computed wins over user
# overlays. Remove the stale 00 file unconditionally.

- name: Remove stale controlplane network patch at old 00 prefix
  ansible.builtin.file:
    path: "{{ config_render_talos_patches_out }}/controlplane/00-network.yaml.j2"
    state: absent

# --- 90-user-raw: legacy talos.patches.all raw fragments ---

- name: Render all-node user-raw patch (90-user-raw.yaml.j2)
  ansible.builtin.template:
    src: talos_patches/all/90-user-raw.yaml.j2
    dest: "{{ config_render_talos_patches_out }}/all/90-user-raw.yaml.j2"
    mode: "0644"
  when: config_render_merged.talos.patches.all | default([]) | length > 0

- name: Remove stale all-node user-raw patch when no fragments configured
  ansible.builtin.file:
    path: "{{ config_render_talos_patches_out }}/all/90-user-raw.yaml.j2"
    state: absent
  when: config_render_merged.talos.patches.all | default([]) | length == 0

# ===========================================================================
# CONTROL-PLANE PATCHES (--config-patch-control-plane)
# ===========================================================================
# Order: 05-base → 06-cluster → 10-components → 15-network → 20-cert-sans → 90-user-raw
# Network patch at 15: after base/cluster/component overlays so the computed VIP
# wins over any user overlay that might touch the same network interface.
# Base and cluster overlays must not override the single-source VIP — later
# patches win per Talos strategic merge.

# --- 15-network: computed (VIP on private interface) ---

- name: Render control-plane network patch (15-network.yaml.j2)
  ansible.builtin.template:
    src: talos_patches/controlplane/00-network.yaml.j2
    dest: "{{ config_render_talos_patches_out }}/controlplane/15-network.yaml.j2"
    mode: "0644"

# --- 05-base: config/talos/base/controlplane.yaml (skip if comment-only) ---

- name: Read base controlplane overlay source
  ansible.builtin.slurp:
    src: "{{ config_render_talos_base_dir }}/controlplane.yaml"
  register: config_render_base_cp_raw
  check_mode: false

- name: Copy base controlplane overlay to generated tree (05-base.yaml.j2)
  ansible.builtin.copy:
    content: |
      {{ config_render_header }}
      # Source: config/talos/base/controlplane.yaml (template-owned, cluster-agnostic)
      {{ '{% raw %}' }}
      {{ config_render_base_cp_raw.content | b64decode }}
      {{ '{% endraw %}' }}
    dest: "{{ config_render_talos_patches_out }}/controlplane/05-base.yaml.j2"
    mode: "0644"
  when: >-
    (config_render_base_cp_raw.content | b64decode | from_yaml_all
     | select('ne', none) | reject('equalto', {}) | list | length > 0)

- name: Remove stale base controlplane overlay when source is empty
  ansible.builtin.file:
    path: "{{ config_render_talos_patches_out }}/controlplane/05-base.yaml.j2"
    state: absent
  when: >-
    (config_render_base_cp_raw.content | b64decode | from_yaml_all
     | select('ne', none) | reject('equalto', {}) | list | length == 0)

# --- 06-cluster: config/clusters/<cluster>/talos/controlplane.yaml (skip if comment-only) ---
# Gracefully handles missing selected-cluster tree (legacy config/overrides/ path).

- name: Stat cluster controlplane overlay source
  ansible.builtin.stat:
    path: "{{ config_render_cluster_talos_dir }}/controlplane.yaml"
  register: config_render_cluster_cp_stat
  check_mode: false

- name: Read cluster controlplane overlay source
  ansible.builtin.slurp:
    src: "{{ config_render_cluster_talos_dir }}/controlplane.yaml"
  register: config_render_cluster_cp_raw
  check_mode: false
  when: config_render_cluster_cp_stat.stat.exists

- name: Set empty cluster controlplane overlay when file missing
  ansible.builtin.set_fact:
    config_render_cluster_cp_raw:
      content: ""
      encoding: base64
  when: not config_render_cluster_cp_stat.stat.exists

- name: Copy cluster controlplane overlay to generated tree (06-cluster.yaml.j2)
  ansible.builtin.copy:
    content: |
      {{ config_render_header }}
      # Source: config/clusters/{{ config_cluster }}/talos/controlplane.yaml (user-owned)
      {{ '{% raw %}' }}
      {{ config_render_cluster_cp_raw.content | b64decode }}
      {{ '{% endraw %}' }}
    dest: "{{ config_render_talos_patches_out }}/controlplane/06-cluster.yaml.j2"
    mode: "0644"
  when: >-
    (config_render_cluster_cp_raw.content | b64decode | from_yaml_all
     | select('ne', none) | reject('equalto', {}) | list | length > 0)

- name: Remove stale cluster controlplane overlay when source is empty
  ansible.builtin.file:
    path: "{{ config_render_talos_patches_out }}/controlplane/06-cluster.yaml.j2"
    state: absent
  when: >-
    (config_render_cluster_cp_raw.content | b64decode | from_yaml_all
     | select('ne', none) | reject('equalto', {}) | list | length == 0)

# --- Controlplane network merge-key hazard validation ---
# The computed 15-network.yaml.j2 patch sets machine.network.interfaces with the
# VIP on the private interface. If a base or cluster controlplane overlay ALSO
# sets machine.network.interfaces, Talos merges them by interface name/
# deviceSelector rather than replacing — both patches take effect, which is
# almost certainly not what the author intended (they likely expected the overlay
# to "win" as a later patch). Fail explicitly to prevent this misconfiguration.
#
# Validation parses the raw YAML documents with from_yaml_all and walks the
# machine → network → interfaces attribute chain for every non-empty document.
# This catches all valid YAML overlay shapes regardless of key ordering,
# indentation style, comments, or multi-document files. The regex predecessor
# could miss valid YAML (e.g. inline-flow machine: {network: {interfaces: [...]}})
# and falsely match comments that happen to contain the key words.

- name: Validate no controlplane overlay sets machine.network.interfaces
  vars:
    # Parse raw YAML into structured documents, skipping None and empty-dict
    # entries (empty or comment-only files produce [None] or [{}]).
    _cp_base_docs: >-
      {{ config_render_base_cp_raw.content | b64decode | from_yaml_all
         | select('ne', none) | reject('equalto', {}) | list }}
    _cp_cluster_docs: >-
      {{ config_render_cluster_cp_raw.content | b64decode | from_yaml_all
         | select('ne', none) | reject('equalto', {}) | list }}
    # Walk machine → network → interfaces through selectattr/map chains.
    # selectattr('key', 'defined') works on dict items; map(attribute='key')
    # extracts the nested dict. If any document reaches the interfaces leaf
    # (i.e. has machine.network.interfaces set to anything, including an empty
    # list), the final list is non-empty → the hazard flag is true.
    _cp_base_has_net_if: >-
      {{ _cp_base_docs
         | selectattr('machine', 'defined') | map(attribute='machine')
         | selectattr('network', 'defined') | map(attribute='network')
         | selectattr('interfaces', 'defined') | list | length > 0 }}
    _cp_cluster_has_net_if: >-
      {{ _cp_cluster_docs
         | selectattr('machine', 'defined') | map(attribute='machine')
         | selectattr('network', 'defined') | map(attribute='network')
         | selectattr('interfaces', 'defined') | list | length > 0 }}
  ansible.builtin.assert:
    that:
      - not _cp_base_has_net_if
      - not _cp_cluster_has_net_if
    fail_msg: >-
      Controlplane overlay merge-key hazard: a controlplane overlay
      (base/controlplane.yaml or cluster/controlplane.yaml) sets
      machine.network.interfaces. This conflicts with the computed
      15-network.yaml.j2 VIP/default-interface patch because Talos
      merges network interfaces by name/deviceSelector — both patches
      take effect instead of the computed one "winning". Remove
      machine.network.interfaces from the controlplane overlay. VIP
      and default interface selection should be managed exclusively
      in config/clusters/{{ config_cluster }}/cluster.yaml (cluster.vip +
      talos.network.defaultInterface). If you intentionally need custom
      network interface config on controlplane nodes, set
      talos.network.defaultInterface in cluster.yaml instead.

# --- 10-components: selected config/talos/components/<name>.yaml ---
# The cilium component (CNI disable + kube-proxy disable) goes to controlplane scope
# because Talos applies CNI configs cluster-wide through etcd consensus — patching
# control-plane nodes propagates the settings.

- name: Read cilium component source (controlplane scope)
  ansible.builtin.slurp:
    src: "{{ config_render_talos_components_dir }}/cilium.yaml"
  register: config_render_comp_cilium_raw
  check_mode: false
  when: "'cilium' in config_render_talos_components"

- name: Copy cilium component to generated controlplane tree
  ansible.builtin.copy:
    content: |
      {{ config_render_header }}
      # Source: config/talos/components/cilium.yaml
      # Selected by: cni.name == 'cilium'
      {{ '{% raw %}' }}
      {{ config_render_comp_cilium_raw.content | b64decode }}
      {{ '{% endraw %}' }}
    dest: "{{ config_render_talos_patches_out }}/controlplane/10-cilium.yaml.j2"
    mode: "0644"
  when: "'cilium' in config_render_talos_components"

- name: Remove stale cilium component when not selected
  ansible.builtin.file:
    path: "{{ config_render_talos_patches_out }}/controlplane/10-cilium.yaml.j2"
    state: absent
  when: "'cilium' not in config_render_talos_components"

# --- 20-cert-sans: computed (kube-apiserver certSANs, split from old 10-cni-proxy) ---
# Only rendered when cluster.certSANs.kubernetes is non-empty. The CNI/proxy
# content that was formerly bundled here moved to config/talos/components/cilium.yaml.

- name: Render control-plane cert SANs patch (20-cert-sans.yaml.j2)
  ansible.builtin.template:
    src: talos_patches/controlplane/20-cert-sans.yaml.j2
    dest: "{{ config_render_talos_patches_out }}/controlplane/20-cert-sans.yaml.j2"
    mode: "0644"
  when: config_render_merged.cluster.certSANs.kubernetes | default([]) | length > 0

- name: Remove stale cert SANs patch when no kubernetes certSANs configured
  ansible.builtin.file:
    path: "{{ config_render_talos_patches_out }}/controlplane/20-cert-sans.yaml.j2"
    state: absent
  when: config_render_merged.cluster.certSANs.kubernetes | default([]) | length == 0

# --- 90-user-raw: legacy talos.patches.controlplane raw fragments ---

- name: Render control-plane user-raw patch (90-user-raw.yaml.j2)
  ansible.builtin.template:
    src: talos_patches/controlplane/90-user-raw.yaml.j2
    dest: "{{ config_render_talos_patches_out }}/controlplane/90-user-raw.yaml.j2"
    mode: "0644"
  when: config_render_merged.talos.patches.controlplane | default([]) | length > 0

- name: Remove stale control-plane user-raw patch when no fragments configured
  ansible.builtin.file:
    path: "{{ config_render_talos_patches_out }}/controlplane/90-user-raw.yaml.j2"
    state: absent
  when: config_render_merged.talos.patches.controlplane | default([]) | length == 0

# ===========================================================================
# WORKER PATCHES (--config-patch-worker)
# ===========================================================================
