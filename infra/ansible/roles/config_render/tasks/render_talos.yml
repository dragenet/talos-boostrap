# Worker-scope patches affect pure worker nodes only. Hybrid nodes consume
# the controlplane config (all + controlplane patches) instead, so worker
# overlays are unused on hybrid-only clusters like kube1. The rendering
# infrastructure exists so pure-worker nodes added later pick them up.

# --- 05-base: config/talos/base/worker.yaml (skip if comment-only) ---

- name: Read base worker overlay source
  ansible.builtin.slurp:
    src: "{{ config_render_talos_base_dir }}/worker.yaml"
  register: config_render_base_worker_raw
  check_mode: false

- name: Copy base worker overlay to generated tree (05-base.yaml.j2)
  ansible.builtin.copy:
    content: |
      {{ config_render_header }}
      # Source: config/talos/base/worker.yaml (template-owned, cluster-agnostic)
      {{ '{% raw %}' }}
      {{ config_render_base_worker_raw.content | b64decode }}
      {{ '{% endraw %}' }}
    dest: "{{ config_render_talos_patches_out }}/worker/05-base.yaml.j2"
    mode: "0644"
  when: >-
    (config_render_base_worker_raw.content | b64decode | from_yaml_all
     | select('ne', none) | reject('equalto', {}) | list | length > 0)

- name: Remove stale base worker overlay when source is empty
  ansible.builtin.file:
    path: "{{ config_render_talos_patches_out }}/worker/05-base.yaml.j2"
