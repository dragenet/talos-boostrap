---
# Load config inputs: defaults + selected-cluster overrides + nodes (ADR-016).
#
# Loading order:
#   1. config/defaults/cluster.yaml         — always loaded
#   2. config/clusters/{{ config_cluster }}/cluster.yaml  — selected-cluster overrides
#   3. config/clusters/{{ config_cluster }}/nodes.yaml    — selected-cluster nodes
#
# Legacy fallback (ADR-016 staged compatibility):
#   When selected-cluster files do not exist, fall back to config/overrides/*
#   with a deprecation warning. This fallback will be removed in a future cleanup
#   once all clusters have migrated.
#
# Deep-merges defaults with overrides (overrides win per-key).
# User-owned lists (nodes, storage.volumes) replace defaults entirely.

- name: Read defaults config
  ansible.builtin.slurp:
    src: "{{ config_render_defaults_path }}"
  register: config_render_defaults_raw
  check_mode: false

# ─── Resolve overrides source: selected-cluster or legacy fallback (ADR-016) ───

- name: Check if selected-cluster cluster.yaml exists
  ansible.builtin.stat:
    path: "{{ config_render_cluster_config_path }}"
  register: config_render_cluster_config_stat
  check_mode: false

- name: Read selected-cluster overrides config
  ansible.builtin.slurp:
    src: "{{ config_render_cluster_config_path }}"
  register: config_render_overrides_raw_cluster
  check_mode: false
  when: config_render_cluster_config_stat.stat.exists

- name: Fall back to legacy overrides config with deprecation warning
  when: not config_render_cluster_config_stat.stat.exists
  block:
    - name: Warn about legacy overrides fallback (ADR-016 migration)
      ansible.builtin.debug:
        msg: >-
          DEPRECATION: config/clusters/{{ config_cluster }}/cluster.yaml not found;
          falling back to config/overrides/cluster.yaml. This is a legacy path
          for ADR-016 staged compatibility. Migrate your overrides to
          config/clusters/{{ config_cluster }}/cluster.yaml.
    - name: Read legacy overrides config
      ansible.builtin.slurp:
        src: "{{ config_render_overrides_path }}"
      register: config_render_overrides_raw_legacy
      check_mode: false

# ─── Resolve nodes source ───

- name: Check if selected-cluster nodes.yaml exists
  ansible.builtin.stat:
    path: "{{ config_render_cluster_nodes_path }}"
  register: config_render_cluster_nodes_stat
  check_mode: false

- name: Read selected-cluster nodes config
  ansible.builtin.slurp:
    src: "{{ config_render_cluster_nodes_path }}"
  register: config_render_nodes_raw_cluster
  check_mode: false
  when: config_render_cluster_nodes_stat.stat.exists

- name: Fall back to legacy nodes config with deprecation warning
  when: not config_render_cluster_nodes_stat.stat.exists
  block:
    - name: Warn about legacy nodes fallback (ADR-016 migration)
      ansible.builtin.debug:
        msg: >-
          DEPRECATION: config/clusters/{{ config_cluster }}/nodes.yaml not found;
          falling back to config/overrides/nodes.yaml. This is a legacy path
          for ADR-016 staged compatibility. Migrate your node definitions to
          config/clusters/{{ config_cluster }}/nodes.yaml.
    - name: Read legacy nodes config
      ansible.builtin.slurp:
        src: "{{ config_render_nodes_path }}"
      register: config_render_nodes_raw_legacy
      check_mode: false

# ─── Resolve effective overrides and nodes from the selected source ───

- name: Resolve effective overrides source (cluster or legacy)
  ansible.builtin.set_fact:
    config_render_overrides_raw: >-
      {{ config_render_overrides_raw_cluster
         if config_render_cluster_config_stat.stat.exists
         else config_render_overrides_raw_legacy }}

- name: Resolve effective nodes source (cluster or legacy)
  ansible.builtin.set_fact:
    config_render_nodes_raw: >-
      {{ config_render_nodes_raw_cluster
         if config_render_cluster_nodes_stat.stat.exists
         else config_render_nodes_raw_legacy }}

# ─── Parse and merge ───

- name: Parse config inputs from YAML
  ansible.builtin.set_fact:
    config_render_defaults: "{{ config_render_defaults_raw.content | b64decode | from_yaml }}"
    config_render_overrides: "{{ config_render_overrides_raw.content | b64decode | from_yaml }}"
    config_render_nodes: "{{ config_render_nodes_raw.content | b64decode | from_yaml }}"

# Deep merge: maps merge recursively, overrides win. User-owned lists
# (nodes, storage.volumes) are replaced entirely by overrides.
- name: Deep-merge defaults with overrides
  ansible.builtin.set_fact:
    config_render_merged: >-
      {{ config_render_defaults | combine(config_render_overrides, recursive=true) }}

# Nodes is a user-owned list — replace, don't merge.
- name: Set nodes from overrides
  ansible.builtin.set_fact:
    config_render_nodes_list: "{{ config_render_nodes.nodes | default([]) }}"
