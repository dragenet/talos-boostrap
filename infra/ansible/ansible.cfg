[defaults]
# No default inventory — select provider explicitly at run time:
#   -i inventories/common -i inventories/providers/hcloud    (Hetzner Cloud)
#   -i inventories/common -i inventories/providers/manual    (bare metal / other cloud)
# inventories/common carries provider-agnostic group_vars (cluster, talos, flux).
# The provider inventory carries hosts and provider-specific vars.
roles_path        = roles:roles/providers
# collections_path (singular) is the current key; collections_paths is deprecated.
# Project-local so requirements.yml pins are reproducible per-checkout.
collections_path  = ./.collections
# host_group_vars loads plain inventory/group_vars/*.yml;
# community.sops.sops additionally auto-decrypts any group_vars/*.sops.yaml.
vars_plugins_enabled = host_group_vars,community.sops.sops

[inventory]
# Defaults are host_list, script, auto, yaml, ini; add hetzner.hcloud.hcloud for the
# dynamic inventory source (inventories/providers/hcloud/hcloud.yml).
enable_plugins = host_list, script, auto, yaml, ini, hetzner.hcloud.hcloud
