---
# Hetzner Cloud provider — kubeconfig external access patch.
#
# The Talos-generated kubeconfig always points to the private cluster VIP
# (cluster_vip: 10.0.0.10) which is not routable from outside the Hetzner
# private network. bootstrap-talos.yml applies this override after
# talosctl kubeconfig fetches the file, replacing the server URL with the
# public IP of the first hybrid node.
#
# This is valid because public IPs are added as Kubernetes API certSANs
# via infra/talos/patches/generated/controlplane/20-cert-sans.yaml.j2.
#
# groups['hybrid'][0] is the first Hetzner node (example-hb1) — keyed_groups
# in hcloud.yml groups servers by their hcloud_labels.role, so all hybrid
# nodes land in the 'hybrid' group.
#
# This file is NOT generated by render-config — it is provider-owned and
# lives alongside the generated hcloud.yml.
talos_kubeconfig_server_override: "https://{{ hostvars[groups['hybrid'][0]].node_public_ip }}:6443"
