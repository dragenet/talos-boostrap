---
# Manual provider inventory — for nodes provisioned outside of Ansible
# (bare metal, other clouds, pre-existing VMs). Fill in real IPs before use.
#
# Contract: every node must provide node_role, node_public_ip, and
# node_private_ip. The bootstrap-talos.yml playbook will upgrade each node to
# the factory image (factory.talos.dev/installer/<schematic>:<version>) if it
# isn't already running it, so any base OS is acceptable before first bootstrap.
#
# Run model (no Hetzner token required):
#   ansible-playbook -i inventories/common -i inventories/providers/manual \
#     playbooks/bootstrap-talos.yml
all:
  children:
    hybrid:
      vars:
        node_role: hybrid
      hosts:
        kube1-hb1:
          node_public_ip: 1.2.3.4        # replace with real public IP
          node_private_ip: 10.0.0.2
        kube1-hb2:
          node_public_ip: 1.2.3.5        # replace with real public IP
          node_private_ip: 10.0.0.3
        kube1-hb3:
          node_public_ip: 1.2.3.6        # replace with real public IP
          node_private_ip: 10.0.0.4
