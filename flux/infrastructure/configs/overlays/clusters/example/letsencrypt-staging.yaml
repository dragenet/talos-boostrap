---
# ClusterIssuer for Let's Encrypt staging ACME (test certificates).
# This is a user-owned resource for example cluster. The Cloudflare API token Secret
# (cloudflare-api-token/api-token) must be provisioned out-of-band — DNS-01
# challenges will NOT solve until it exists.
#
# Email is optional; fill in spec.acme.email for expiry/revocation notices.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: ""
    privateKeySecretRef:
      name: letsencrypt-staging-account-key
    solvers:
      - dns01:
          cloudflare:
            apiTokenSecretRef:
              name: cloudflare-api-token
              key: api-token
