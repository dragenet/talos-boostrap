---
# Namespace for Cilium CNI — dedicated per the bootstrap component namespace
# convention (ADR-002, ADR-005). Ansible creates this namespace pre-Flux and
# installs the Cilium Helm release here. Flux then owns the Namespace for
# steady-state reconciliation.
apiVersion: v1
kind: Namespace
metadata:
  name: cilium-system
  labels:
    # Talos enforces PSA baseline cluster-wide (only kube-system exempted).
    # Cilium requires privileged: hostNetwork, hostPath, SYS_ADMIN, etc.
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/enforce-version: latest
