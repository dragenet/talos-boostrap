---
# HelmRelease for the Envoy Gateway CRDs chart (standard channel).
#
# Installs both Gateway API standard-channel CRDs and Envoy Gateway
# CRDs into envoy-gateway-system. This is a purely Flux-managed
# component — no pre-Flux Ansible install, no adoption handshake.
# Flux creates the namespace via install.createNamespace: true
# (belt-and-suspenders with namespace.yaml in this kustomization).
#
# The CRDs must be installed before the Envoy Gateway controller
# HelmRelease (future catalog entry). Gateway classes, gateways,
# and HTTPRoutes all depend on these CRDs being present.
#
# install.crds: Create — this chart bundles its CRDs in the
# traditional crds/ directory, and we WANT Flux to manage their
# lifecycle. Create (not CreateReplace) avoids unnecessary churn
# on existing CRDs during upgrades.
#
# Namespace: envoy-gateway-system — the same namespace the Envoy
# Gateway main controller will reside in.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: envoy-gateway-crds
  namespace: envoy-gateway-system
spec:
  interval: 1h
  releaseName: envoy-gateway-crds
  targetNamespace: envoy-gateway-system
  install:
    createNamespace: true
    crds: Create
  chart:
    spec:
      chart: gateway-crds-helm
      version: v1.8.1          # pin: matches EG v1.8.1, released 2026-06-05
      sourceRef:
        kind: HelmRepository
        name: envoy-gateway-crds
        namespace: envoy-gateway-system
  values:
    crds:
      gatewayAPI:
        enabled: true
        channel: "standard"
      envoyGateway:
        enabled: true
