---
# _components/gateway-api/standard/ — Gateway API standard-channel CRDs + envoy-gateway CRDs.
#
# Owner: Template maintainers. Edit only when updating the Gateway API
# CRD adoption contract; cluster-specific overrides go through
# ../../overlays/clusters/example/ (user-owned patches).
#
# The CRDs are committed as raw YAML (gateway-api-crds.yaml, rendered from
# oci://docker.io/envoyproxy/gateway-crds-helm@v1.8.1) rather than managed
# via a HelmRelease because the chart exceeds Helm's 1 MB Secret storage
# limit ("data: Too long: may not be more than 1048576 bytes"). Committing
# rendered CRDs is the recommended GitOps pattern for large CRD bundles:
# pinned, auditable, diff-visible on upgrades, zero network dependency at
# reconcile time.
#
# The namespace (envoy-gateway-system) is declared via namespace.yaml.
# Deployment order: Namespace → CRDs.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - namespace.yaml
  - gateway-api-crds.yaml
