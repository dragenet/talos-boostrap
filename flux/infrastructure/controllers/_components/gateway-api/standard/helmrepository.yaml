---
# OCI HelmRepository for the Envoy Gateway CRDs chart.
#
# Uses the envoyproxy Docker Hub OCI repository. Flux with type: oci
# appends chart.spec.chart (gateway-crds-helm) to the URL, resolving to
# oci://docker.io/envoyproxy/gateway-crds-helm. NOT a traditional Helm
# HTTP/S index. The chart installs both Gateway API CRDs and Envoy
# Gateway CRDs (configurable via values).
#
# Type: oci — an OCI HelmRepository is a data container (no Artifact
# produced, no READY condition). The HelmRelease resolves chart
# references against it.
#
# Lives in envoy-gateway-system alongside the HelmRelease it serves.
# The namespace is declared via namespace.yaml (belt-and-suspenders
# with install.createNamespace on the HelmRelease).
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: envoy-gateway-crds
  namespace: envoy-gateway-system
spec:
  type: oci
  interval: 1h        # ineffectual for OCI repos; kept for schema compliance
  url: oci://docker.io/envoyproxy
